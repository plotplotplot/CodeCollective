user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 ipv6=off valid=10s;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    # resolver already set above

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Common proxy headers for upstream services.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location ^~ /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name _;
        http2 on;

        ssl_certificate /certs/nginx/fullchain.pem;
        ssl_certificate_key /certs/nginx/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        root /app;
        index index.html;

        location ^~ /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
        }

        location /static/ {
            alias /static/;
            access_log off;
            expires 7d;
        }

        location / {
            try_files $uri /index.html =404;
        }

        location = /dev { return 301 /dev/; }
        location /dev/ {
            proxy_pass http://webapp:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /pidp { return 301 /pidp/; }
        location /pidp/ {
            rewrite ^/pidp/(.*)$ /$1 break;
            proxy_pass http://pidp:8000;
        }

        location = /minio { return 301 /minio/; }
        location /minio/ {
            rewrite ^/minio/(.*)$ /$1 break;
            proxy_pass http://minio:9001;
        }

        location = /s3 { return 301 /s3/; }
        location /s3/ {
            rewrite ^/s3/(.*)$ /$1 break;
            proxy_pass http://minio:9000;
        }

        location = /spicedb { return 301 /spicedb/; }
        location /spicedb/ {
            rewrite ^/spicedb/(.*)$ /$1 break;
            proxy_pass http://spicedb:8443;
        }

        location = /cockroach { return 301 /cockroach/; }
        location /cockroach/ {
            rewrite ^/cockroach/(.*)$ /$1 break;
            set $cockroach_upstream cockroach;
            proxy_pass http://$cockroach_upstream:8080;
        }

        location /api/org/ {
            set $org_backend org-backend:8001;
            rewrite ^/api/org/(.*)$ /$1 break;
            proxy_pass http://$org_backend;
        }

        location /api/governance/ {
            set $governance_backend governance-backend:8002;
            proxy_pass http://$governance_backend;
        }

        location = /ubi { return 301 /ubi/; }
        location /ubi/ {
            rewrite ^/ubi/(.*)$ /$1 break;
            proxy_pass http://ubi:8000;
        }
    }
}
