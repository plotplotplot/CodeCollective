  <script>
    (function () {
      const DEFAULT_CITY_OPTIONS = ['baltimore', 'westvirginia', 'hawaii', 'dc', 'pittsburgh', 'philadelphia', 'virtual'];
      const DEFAULT_CITY_DISPLAY_NAMES = {
        baltimore: 'Baltimore',
        westvirginia: 'West Virginia',
        hawaii: 'Hawaii',
        dc: 'Washington, D.C.',
        pittsburgh: 'Pittsburgh',
        philadelphia: 'Philadelphia',
        virtual: 'Virtual',
      };

      window.CALENDAR_CITY_OPTIONS = window.CALENDAR_CITY_OPTIONS || DEFAULT_CITY_OPTIONS;
      window.CALENDAR_CITY_DISPLAY_NAMES = window.CALENDAR_CITY_DISPLAY_NAMES || DEFAULT_CITY_DISPLAY_NAMES;

      const cityOptions = window.CALENDAR_CITY_OPTIONS;
      const cityDisplayNames = window.CALENDAR_CITY_DISPLAY_NAMES;

      function getCityDisplayName(city) {
        return cityDisplayNames[city] || city.charAt(0).toUpperCase() + city.slice(1);
      }

      function getCityFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        const city = urlParams.get('city');
        return cityOptions.includes(city) ? city : 'baltimore';
      }

      function updateCityDetails() {
        const city = getCityFromUrl();
        const displayName = getCityDisplayName(city);
        const cityNameEl = document.getElementById('orgs-city-name');
        if (cityNameEl) {
          cityNameEl.textContent = displayName;
        }
      }

      function populateCitySelector() {
        const select = document.getElementById('city-select');
        if (!select) return;
        select.innerHTML = '';

        cityOptions.forEach(city => {
          const option = document.createElement('option');
          option.value = city;
          option.textContent = getCityDisplayName(city);
          select.appendChild(option);
        });

        const currentCity = getCityFromUrl();
        select.value = currentCity;
        select.addEventListener('change', () => {
          const targetCity = select.value;
          const url = new URL(window.location.href);
          url.searchParams.set('city', targetCity);
          window.location.href = url.toString();
        });
      }

      function initializeCityControls() {
        updateCityDetails();
        populateCitySelector();
      }

      document.addEventListener('DOMContentLoaded', initializeCityControls);
    })();
  </script>

    let categoryMapConfig = FALLBACK_CATEGORY_MAP_CONFIG;
    let activeCategoryMap = FALLBACK_CATEGORY_MAP_CONFIG.maps.find(map => map.id === FALLBACK_CATEGORY_MAP_CONFIG.default_map) || FALLBACK_CATEGORY_MAP_CONFIG.maps[0];
    let activeTagSlugs = new Set();
    let allOrgs = [];
    let filteredOrgs = [];
    let rawEvents = [];
    let searchQuery = '';

    async function loadCategoryMapConfig() {
      try {
        const indexResponse = await fetch(CATEGORY_MAPS_INDEX_URL, { cache: 'no-store' });
        if (!indexResponse.ok) throw new Error(`Category map index HTTP ${indexResponse.status}`);
        const indexData = await indexResponse.json();
        const mapRefs = Array.isArray(indexData.maps) ? indexData.maps : [];
        if (mapRefs.length === 0) return FALLBACK_CATEGORY_MAP_CONFIG;
        const loadedMaps = await Promise.all(
          mapRefs.map(async (ref) => {
            if (!ref?.path) return null;
            const response = await fetch(ref.path, { cache: 'no-store' });
            if (!response.ok) return null;
            const mapData = await response.json();
            return { ...mapData, id: mapData.id || ref.id, label: mapData.label || ref.label || mapData.id || 'Unnamed Map' };
          })
        );
        const maps = loadedMaps.filter(Boolean);
        if (maps.length === 0) return FALLBACK_CATEGORY_MAP_CONFIG;
        return { default_map: indexData.default_map || maps[0].id, maps };
      } catch (error) {
        return FALLBACK_CATEGORY_MAP_CONFIG;
      }
    }

    function slugifyTag(tag) {
      return String(tag || '').toLowerCase().replace(/&/g, 'and').replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');

        const parsed = new URL(url);
        const host = parsed.hostname.replace(/^www\./, '');
        const segments = parsed.pathname.split('/').filter(Boolean);
        if (host.includes('meetup.com') && segments[0]) {
          return segments[0].replace(/[-_]+/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }
        if ((host.includes('lu.ma') || host.includes('luma.com')) && segments[0]) {
          return segments[segments.length - 1].replace(/[-_]+/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }
        if (host.includes('eventbrite.') && segments[0] === 'o' && segments[1]) {
          return segments[1].replace(/[-_]+/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }
        return host;
      } catch (error) {
        return fallback;
      }
    }

    function getCategoryMapById(mapId) {
      return (categoryMapConfig.maps || []).find(map => map.id === mapId) || (categoryMapConfig.maps || [])[0] || FALLBACK_CATEGORY_MAP_CONFIG.maps[0];
    }

    function normalizeMapCategory(category) {
      return {
        label: category.label,
        color: category.color || '#475569',
        textColor: category.text_color || '#ffffff',
        slug: slugifyTag(category.label),
        matchSlugs: new Set((category.matches || []).map(slugifyTag).filter(Boolean))
      };
    }

    function getOtherCategory(categoryMap) {
      // Other is now a regular category, not handled separately
      return null;
    }

    function getMappedCategoriesForTags(tags, categoryMap = activeCategoryMap) {
      const normalizedTags = Array.isArray(tags) ? tags.map(slugifyTag).filter(Boolean) : [];
      return (categoryMap?.categories || [])
        .map(normalizeMapCategory)
        .filter(category => normalizedTags.some(tag => category.matchSlugs.has(tag)));
    }

    function isTechOnlyEvent(tags) {
      const normalizedTags = new Set((Array.isArray(tags) ? tags : []).map(slugifyTag).filter(Boolean));
      if (normalizedTags.size === 0) return false;
      const specificTechTags = new Set(['ai', 'data-science', 'cybersecurity', 'cloud-and-platform', 'devops', 'software-development', 'web-development', 'javascript', 'python', 'ruby', 'open-source', 'technical-writing', 'game-development', 'ux', 'product', 'crypto-and-web3', 'makerspace', 'robotics', 'civic-tech']);
      const genericTechTags = new Set(['tech-skills', 'tech-community', 'code-collective-and-partners']);
      const dominantNonTechTags = new Set(['water', 'water-and-environment', 'religion', 'culture', 'community', 'politics', 'food', 'housing', 'shelter-and-habitat', 'clothing', 'survival-and-health', 'safety-and-stability', 'belonging-and-culture', 'purpose-and-service', 'faith-and-spirituality', 'business', 'economic-development', 'professional-networking', 'career-growth', 'startup', 'waterfront', 'infrastructure', 'finance']);
      if (Array.from(normalizedTags).some(tag => specificTechTags.has(tag))) return true;
      if (!Array.from(normalizedTags).some(tag => genericTechTags.has(tag))) return false;
      if (Array.from(normalizedTags).some(tag => dominantNonTechTags.has(tag))) return false;
      return true;
    }

    function getEffectiveMappedCategories(tags, categoryMap = activeCategoryMap) {
      if (categoryMap?.id === 'tech_only' && !isTechOnlyEvent(tags)) return [];
      return getMappedCategoriesForTags(tags, categoryMap);
    }

    function getTodayStart() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return today;
    }

    function isEventOnOrAfterToday(dateInput, todayStart = getTodayStart()) {
      if (!dateInput) return false;
      const eventDate = new Date(dateInput);
      if (isNaN(eventDate)) return false;
      eventDate.setHours(0, 0, 0, 0);
      return eventDate >= todayStart;
    }

    function aggregateOrganizations(events) {
      const orgMap = new Map();
      const todayStart = getTodayStart();
      events.forEach(event => {
        const sourceUrl = event.source || event.url || '';
        const sourceGroup = event.source_group || formatSourceLabel(sourceUrl, 'Unknown source');
        const orgImageUrl = event.orgImageUrl || '';
        const tags = Array.isArray(event.tags) ? event.tags : [];
        const startDate = event.startDate || '';
        const isUpcoming = isEventOnOrAfterToday(startDate, todayStart);
        if (!orgMap.has(sourceGroup)) {
          orgMap.set(sourceGroup, {
            name: sourceGroup,
            sourceUrl: sourceUrl,
            imageUrl: orgImageUrl,
            totalEvents: 0,
            upcomingEvents: 0,
            tags: new Set(),
            firstEventDate: startDate,
            searchText: sourceGroup.toLowerCase()
          });
        }
        const org = orgMap.get(sourceGroup);
        org.totalEvents++;
        if (isUpcoming) org.upcomingEvents++;
        tags.forEach(tag => {
          org.tags.add(tag);
          org.searchText += ' ' + tag.toLowerCase();
        });
        if (startDate && startDate < org.firstEventDate) {
          org.firstEventDate = startDate;
        }
      });
      return Array.from(orgMap.values())
        .map(org => ({
          ...org,
          tags: Array.from(org.tags),
          primaryCategories: getEffectiveMappedCategories(Array.from(org.tags))
        }))
        .sort((a, b) => {
          if (b.upcomingEvents !== a.upcomingEvents) {
            return b.upcomingEvents - a.upcomingEvents;
          }
          return b.totalEvents - a.totalEvents;
        });
    }

    function getValidSelectedTags(selectedTags, categoryMap) {
      const availableTags = new Set(
        Array.isArray(categoryMap?.categories)
          ? categoryMap.categories.map(category => slugifyTag(category.label))
          : []
      );
      const validTags = Array.isArray(selectedTags)
        ? selectedTags.filter(tag => availableTags.has(tag))
        : [];
      return validTags.length > 0 ? validTags : Array.from(availableTags);
    }

    function filterOrganizations() {
      let result = allOrgs;
      if (activeTagSlugs.size > 0) {
        // Show orgs that have at least one matching category OR have no categories at all (uncategorized)
        result = result.filter(org => {
          if (org.primaryCategories.length === 0) return true; // Include uncategorized orgs
          return org.primaryCategories.some(cat => activeTagSlugs.has(cat.slug));
        });
      }
      if (searchQuery.trim()) {
        const query = searchQuery.toLowerCase();
        result = result.filter(org => org.searchText.includes(query));
      }
      filteredOrgs = result;
      return result;
    }

    function highlightMatch(text, query) {
      if (!query) return text;
      const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
      return text.replace(regex, '<mark>$1</mark>');
    }

    function escapeRegex(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // Legend functions matching calendar.js exactly
    function buildLegendItem(category, isChecked) {
      const item = document.createElement('label');
      item.className = 'legend-item';
      if (activeCategoryMap?.id === 'maslow_needs') {
        item.classList.add('legend-card');
      }
      item.innerHTML = `
        <input type="checkbox" data-tag="${category.slug}" ${isChecked ? 'checked' : ''} />
        <span class="legend-swatch" style="background-color: ${category.color}; color: ${category.textColor};"></span>
        <span class="legend-text">${category.label}</span>
      `;
      return item;
    }

    function buildMaslowLegendList(categories, activeSlugs) {
      const list = document.createElement('div');
      list.className = 'legend-list maslow-hierarchy';
      const rowDefs = [
        ['Purpose & Service'],
        ['Growth & Creativity'],
        ['Esteem & Opportunity'],
        ['Belonging & Culture'],
        ['Safety & Stability'],
        ['Food', 'Water', 'Shelter + Habitat', 'Clothing', 'Survival & Health']
      ];
      rowDefs.forEach((labels, index) => {
        const row = document.createElement('div');
        row.className = `legend-row legend-row-${index + 1}`;
        labels.forEach(label => {
          const category = categories.find(item => item.label === label);
          if (!category) return;
          const isChecked = activeSlugs.size === 0 ? true : activeSlugs.has(category.slug);
          row.appendChild(buildLegendItem(category, isChecked));
        });
        if (row.childElementCount > 0) {
          list.appendChild(row);
        }
      });
      return list;
    }

    function buildLegend(categoryMap, options = {}) {
      activeCategoryMap = categoryMap || getCategoryMapById(categoryMapConfig.default_map);
      const categories = activeCategoryMap.categories || [];

      const legendItems = document.getElementById('calendar-legend-items');
      if (!legendItems || !Array.isArray(categories)) {
        return;
      }

      legendItems.innerHTML = '';

      const controls = document.createElement('div');
      controls.className = 'legend-controls';
      const mapOptions = (categoryMapConfig.maps || [])
        .map(map => `<option value="${map.id}" ${map.id === activeCategoryMap.id ? 'selected' : ''}>${map.label}</option>`)
        .join('');
      controls.innerHTML = `
        <label class="legend-map-picker">
          <span class="legend-text">Map</span>
          <select id="legend-map-select">${mapOptions}</select>
        </label>
        <div class="legend-actions">
          <button type="button" class="legend-action" data-action="all">Select all</button>
          <button type="button" class="legend-action" data-action="none">Select none</button>
          <button type="button" class="legend-action" data-action="hide">Hide legend</button>
        </div>
      `;
      legendItems.appendChild(controls);

      const normalizedCategories = categories.map(normalizeMapCategory);
      let list;

      if (activeCategoryMap.id === 'maslow_needs') {
        list = buildMaslowLegendList(normalizedCategories, activeTagSlugs);
      } else {
        list = document.createElement('div');
        list.className = 'legend-list';
        normalizedCategories.forEach(category => {
          const isChecked = activeTagSlugs.size === 0 ? true : activeTagSlugs.has(category.slug);
          list.appendChild(buildLegendItem(category, isChecked));
        });
      }

      legendItems.appendChild(list);

      legendItems.onchange = event => {
        if (event.target.matches('#legend-map-select')) {
          activeCategoryMap = getCategoryMapById(event.target.value);
          activeTagSlugs.clear();
          buildLegend(activeCategoryMap, { lockMapId: true });
          renderOrganizations();
          return;
        }
        if (!event.target.matches('input[type="checkbox"][data-tag]')) return;
        updateActiveTagsFromLegend();
        renderOrganizations();
      };

      legendItems.onclick = event => {
        const actionBtn = event.target.closest('.legend-action');
        if (!actionBtn) return;
        const action = actionBtn.dataset.action;
        if (action === 'all') {
          setLegendCheckboxes(true);
        } else if (action === 'none') {
          setLegendCheckboxes(false);
        } else if (action === 'hide') {
          setLegendVisibility(true);
        }
      };

      const visibilityToggle = document.getElementById('legend-visibility-toggle');
      if (visibilityToggle) {
        visibilityToggle.onclick = () => {
          setLegendVisibility(false);
        };
      }

      // Sync activeTagSlugs with the current checkbox state
      updateActiveTagsFromLegend();
    }

    function setLegendVisibility(hidden) {
      document.body.classList.toggle('legend-hidden', hidden);
      const toggleButton = document.getElementById('legend-visibility-toggle');
      if (toggleButton) {
        toggleButton.textContent = hidden ? 'Show legend' : 'Hide legend';
        toggleButton.setAttribute('aria-expanded', hidden ? 'false' : 'true');
      }
    }

    function setLegendCheckboxes(checked) {
      const inputs = document.querySelectorAll('#calendar-legend-items input[type="checkbox"][data-tag]');
      inputs.forEach(input => {
        input.checked = checked;
      });
      updateActiveTagsFromLegend();
      renderOrganizations();
    }

    function updateActiveTagsFromLegend() {
      const inputs = document.querySelectorAll('#calendar-legend-items input[type="checkbox"][data-tag]');
      activeTagSlugs = new Set(
        Array.from(inputs)
          .filter(input => input.checked)
          .map(input => input.dataset.tag)
      );
    }

    function renderOrganizations() {
      const container = document.getElementById('orgs-list');
      const statsEl = document.getElementById('search-stats');
      if (!container) return;

      const orgs = filterOrganizations();

      if (statsEl) {
        if (searchQuery) {
          statsEl.textContent = `Showing ${orgs.length} of ${allOrgs.length} organizations`;
        } else {
          statsEl.textContent = `${orgs.length} organizations`;
        }
      }

      if (orgs.length === 0) {
        container.innerHTML = `
          <div class="no-orgs-message">
            <i class="fas fa-search"></i>
            <h3>No organizations found</h3>
            <p>Try adjusting your search or filters</p>
            <button class="clear-filters-btn" onclick="clearFilters()">
              <i class="fas fa-undo"></i> Clear all filters
            </button>
          </div>
        `;
        return;
      }

      let html = '';
      orgs.forEach((org, index) => {
        const rank = index + 1;
        const primaryCategory = org.primaryCategories[0];
        const tagStyle = primaryCategory ? `--tag-color: ${primaryCategory.color}; --tag-text-color: ${primaryCategory.textColor};` : '';
        const taggedClass = primaryCategory ? 'tagged' : '';
        const rankClass = rank <= 3 ? 'top-3' : '';

        const iconHtml = org.imageUrl
          ? `<div class="org-icon-wrap"><img src="${org.imageUrl}" alt="${org.name}" class="org-icon" onerror="this.parentNode.innerHTML='<div class=\\'org-icon-placeholder\\'><i class=\\'fas fa-building\\'></i></div>';">${primaryCategory ? `<span class="org-badge" style="background: ${primaryCategory.color};"></span>` : ''}</div>`
          : `<div class="org-icon-wrap"><div class="org-icon-placeholder"><i class="fas fa-building"></i></div>${primaryCategory ? `<span class="org-badge" style="background: ${primaryCategory.color};"></span>` : ''}</div>`;

        const topTags = org.tags.slice(0, 3);
        const tagsHtml = topTags.map(tag => {
          const mapped = getMappedCategoriesForTags([tag])[0];
          if (mapped) {
            return `<span class="org-tag primary" style="--tag-color: ${mapped.color}; --tag-text-color: ${mapped.textColor};">${highlightMatch(tag, searchQuery)}</span>`;
          }
          return `<span class="org-tag">${highlightMatch(tag, searchQuery)}</span>`;
        }).join('');

        const orgUrl = org.sourceUrl || '#';
        const displayName = highlightMatch(org.name, searchQuery);
        const upcomingClass = org.upcomingEvents === 0 ? 'zero' : '';

        html += `
          <a href="${orgUrl}" target="_blank" rel="noopener noreferrer" class="org-item ${taggedClass}" style="${tagStyle}">
            <div class="org-rank ${rankClass}">#${rank}</div>
            ${iconHtml}
            <div class="org-info">
              <h3 class="org-name">${displayName}</h3>
              <div class="org-meta">
                <span class="org-source"><i class="fas fa-link"></i> ${formatSourceLabel(org.sourceUrl, 'Website')}</span>
                <div class="org-tags">${tagsHtml}</div>
              </div>
            </div>
            <div class="org-stats">
              <div class="org-stat">
                <span class="org-stat-number ${upcomingClass}">${org.upcomingEvents}</span>
                <span class="org-stat-label">Upcoming</span>
              </div>
              <div class="org-stat">
                <span class="org-stat-number">${org.totalEvents}</span>
                <span class="org-stat-label">Total</span>
              </div>
            </div>
          </a>
        `;
      });

      container.innerHTML = html;
    }

    // Search input handler with debounce
    let searchTimeout;
    function setupSearch() {
      const searchInput = document.getElementById('search-input');
      if (!searchInput) return;

      searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          searchQuery = e.target.value;
          renderOrganizations();
        }, 150);
      });

      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          searchInput.value = '';
          searchQuery = '';
          renderOrganizations();
        }
      });
    }

    function clearFilters() {
      searchQuery = '';
      document.getElementById('search-input').value = '';
      const inputs = document.querySelectorAll('#calendar-legend-items input[type="checkbox"][data-tag]');
      inputs.forEach(input => input.checked = true);
      updateActiveTagsFromLegend();
      renderOrganizations();
    }

    async function loadData() {
      const city = getCityFromUrl();
      const endpoint = `/${city}/upcoming_events.json`;

      try {
        const [mapConfig, events] = await Promise.all([
          loadCategoryMapConfig(),
          fetch(endpoint).then(response => {
            if (!response.ok) throw new Error(`Failed to fetch events for city: ${city}`);
            return response.json();
          })
        ]);

        if (mapConfig && Array.isArray(mapConfig.maps) && mapConfig.maps.length > 0) {
          categoryMapConfig = mapConfig;
          activeCategoryMap = getCategoryMapById(mapConfig.default_map);
        }

        rawEvents = Array.isArray(events) ? events : [];
        allOrgs = aggregateOrganizations(rawEvents);

        document.getElementById('loading').style.display = 'none';
        buildLegend(activeCategoryMap);
        setupSearch();
        renderOrganizations();
      } catch (error) {
        console.error('Error loading data:', error);
        document.getElementById('loading').innerHTML = '<i class="fas fa-exclamation-circle"></i> Error loading organizations. Please try again.';
      }
    }

    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
