  <!-- Scripts -->
  <script>

    // Generic image prefetching function
    function prefetchImages(urls) {
      if (!window.Promise || !window.fetch) return; // Skip if browser doesn't support

      urls.forEach(url => {
        // Create link preload for important above-the-fold images
        const link = document.createElement('link');
        link.rel = 'preload';
        link.as = 'image';
        link.href = url;
        document.head.appendChild(link);

        // Fetch all images to cache them
        fetch(url, {
          mode: 'no-cors',
          cache: 'force-cache'
        }).catch(() => { }); // Silent fail is okay for prefetch
      });
    }

    // First, prefetch all critical static images
    prefetchImages([
      '/images/favicons/favicon.png',
      '/images/WhatsApp.svg.webp',
      '/images/github_icon.png',
      // Add other static images used by your UI
    ]);

  </script>
  <!-- Structured Data -->
  <script type="application/ld+json">

  }
  </script>
