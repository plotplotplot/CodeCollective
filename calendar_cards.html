<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

  <!-- SEO Meta Tags -->

    content="Code Collective organizes tech labor in Baltimore and offers this card-based tech events calendar view." />
  <meta name="robots" content="index, follow" />
  <meta name="googlebot" content="index, follow" />
  <link rel="canonical" href="https://codecollective.us/calendar_cards.html" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://codecollective.us/calendar_cards.html" />
  <meta property="og:site_name" content="Code Collective" />
  <meta property="og:title" content="Code Collective | Baltimore Tech Events Calendar (Cards)" />
  <meta property="og:description"
    content="Organizing tech labor in Baltimore and sharing a community-wide tech events calendar." />

  <!-- Favicon -->
  <link rel="icon" href="/images/favicons/favicon.png" />

  <link rel="preload" href="/css/master.css?v=20260608-accountmenu" as="style">
  <link rel="preload" href="/css/calendar.css" as="style">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/master.css?v=20260608-accountmenu" />
  <link rel="stylesheet" href="/css/calendar.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script>
    (function () {
      const DEFAULT_CITY_OPTIONS = ['baltimore', 'westvirginia', 'hawaii', 'dc', 'pittsburgh', 'philadelphia'];
      const DEFAULT_CITY_DISPLAY_NAMES = {
        baltimore: 'Baltimore',
        westvirginia: 'West Virginia',
        hawaii: 'Hawaii',
        dc: 'Washington, D.C.',
        pittsburgh: 'Pittsburgh',
        philadelphia: 'Philadelphia',
      };

      window.CALENDAR_CITY_OPTIONS = window.CALENDAR_CITY_OPTIONS || DEFAULT_CITY_OPTIONS;
      window.CALENDAR_CITY_DISPLAY_NAMES = window.CALENDAR_CITY_DISPLAY_NAMES || DEFAULT_CITY_DISPLAY_NAMES;

      const cityOptions = window.CALENDAR_CITY_OPTIONS;
      const cityDisplayNames = window.CALENDAR_CITY_DISPLAY_NAMES;

      function getCityDisplayName(city) {
        return cityDisplayNames[city] || city.charAt(0).toUpperCase() + city.slice(1);
      }

      function getCityFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        const city = urlParams.get('city');
        return cityOptions.includes(city) ? city : 'baltimore';
      }

      function updateIcsLink() {
        const city = getCityFromUrl();
        const icsLink = document.querySelector('.download-button');
        if (icsLink) {
          const template = icsLink.dataset.icsTemplate || 'https://calendar.google.com/calendar/u/0/r?cid=http://codecollective.us/{city}/cc_events.ics';
          icsLink.href = template.replace('{city}', city);
        }
      }

      function updateCityDetails() {
        const city = getCityFromUrl();
        const displayName = getCityDisplayName(city);
        const cityNameEl = document.getElementById('calendar-city-name');
        if (cityNameEl) {
          cityNameEl.textContent = displayName;
        }
      }

      function populateCitySelector() {
        const select = document.getElementById('city-select');
        if (!select) return;
        select.innerHTML = '';

        cityOptions.forEach(city => {
          const option = document.createElement('option');
          option.value = city;
          option.textContent = getCityDisplayName(city);
          select.appendChild(option);
        });

        const currentCity = getCityFromUrl();
        select.value = currentCity;
        select.addEventListener('change', () => {
          const targetCity = select.value;
          const url = new URL(window.location.href);
          url.searchParams.set('city', targetCity);
          window.location.href = url.toString();
        });
      }

      function initializeCityControls() {
        updateIcsLink();
        updateCityDetails();
        populateCitySelector();
      }

      document.addEventListener('DOMContentLoaded', initializeCityControls);
    })();
  </script>
</head>

<body id="body">
  <video id="bg-video" autoplay loop muted playsinline>
    <source src="/videos/craig_baltimore_video.mp4" type="video/mp4" media="(max-width: 768px)">
    <source src="/videos/baltimorenight_15s_crossfaded.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <nav class="main-nav" aria-label="Main Navigation">
    <div class="navbar dark-mode">
      <a href="/#main">Home</a>
      <a href="/platform.html">Platform</a>
      <a href="/calendar.html?city=baltimore">Calendar</a>
      <a href="/projects.html">Projects</a>
      <a
        id="portal-login-button"
        class="nav-login-button"
        href="/p/"
        data-pidp-base="https://id.codecollective.us"
        aria-label="Log in to the portal"
      >Login</a>
    </div>
  </nav>

  <main id="wrapper" class="longform dark-mode" style="padding: 0; margin: 0;">
    <section id="main" class="longform dark-mode" style="padding: 0; margin: 0;">
      <header class="header-container" style="text-align: center; padding: 20px 0;">
        <p style="margin-bottom: 8px; font-size: 1.2rem;">Code Collective brings you</p>
        <h1 style="margin: 10px 0; font-size: 2.5rem;">Card-Based <span id="calendar-city-name">Baltimore</span> Tech Calendar</h1>
        <p style="margin-top: 8px; font-size: 1.1rem;">Browse tech meetups and events in a scrollable card layout.</p>
        <p style="margin-top: 8px; font-size: 1.1rem;">Need the simple list instead? <a href="/simplecalendar.html">Visit the streamlined calendar.</a></p>
        <div class="city-selector">
          <label for="city-select">Show events for:</label>
          <select id="city-select" aria-label="Select a city for the calendar"></select>
        </div>
        <a href="#"
          data-ics-template="https://calendar.google.com/calendar/u/0/r?cid=http://codecollective.us/{city}/cc_events.ics"
          class="download-button" target="_blank" rel="noopener noreferrer">
          <i class="fas fa-calendar-alt" aria-hidden="true"></i> Add to Google Calendar
        </a>
      </header>

      <div class="container">
        <section class="calendar-container" aria-label="Card view of Baltimore Tech Events">
          <div id="loading" aria-live="polite">
            <i class="fas fa-spinner fa-spin"></i> Loading card view events...
          </div>
          <div id="calendar"></div>
        </section>
      </div>

      <section class="code-collective-events" aria-label="Events">
        <div id="code-collective-events-container"></div>
      </section>
    </section>

    <script>
      window.FORCE_CALENDAR_CARDS = true;
    </script>
    <script src="/js/calendarFilterUtils.js"></script>
    <script src="/js/calendar.js"></script>
  </main>

  <our-footer></our-footer>
  <our-slack-link></our-slack-link>

</body>
