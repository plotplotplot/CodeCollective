<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Map</title>
    <link rel="stylesheet" href="css/master.css">
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        crossorigin=""
    >
    <style>
        :root {
            --panel-bg: #f6fbff;
            --accent: #0d3d79;
            --card-bg: #ffffff;
            --muted: #5b6b83;
            --border: #b7d5f2;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            background: #e9f3ff;
            color: #0f172a;
        }

        header {
            padding: 1rem 2rem;
            text-align: center;
            background: #a0d6ff;
            border-bottom: 2px solid #002a61;
            -webkit-filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.15));
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.15));
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            color: #002a61;
        }

        .page-container {
            display: flex;
            min-height: calc(100vh - 140px);
        }

        .panel {
            padding: 1.5rem;
        }

        .left-panel {
            width: 40%;
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            max-height: calc(100vh - 140px);
            overflow: hidden;
        }

        .right-panel {
            width: 60%;
            background: #d5ecff;
            padding: 0;
            position: relative;
        }

        .section-title {
            margin: 0;
            font-size: 1.25rem;
            color: var(--accent);
            letter-spacing: 0.02em;
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
        }

        .search-input {
            flex: 1 1 260px;
            padding: 0.85rem 1rem;
            border: 2px solid var(--border);
            border-radius: 999px;
            font-size: 0.95rem;
            color: #0f172a;
            background: #ffffff;
        }

        .search-input:focus {
            outline: none;
            border-color: #0d3d79;
            box-shadow: 0 0 0 3px rgba(13, 61, 121, 0.12);
        }

        .action-button {
            border: 2px solid #0d3d79;
            background: #ffffff;
            color: #0d3d79;
            border-radius: 999px;
            padding: 0.75rem 1rem;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
        }

        .action-button:hover,
        .action-button:focus-visible {
            background: #e6f1ff;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(13, 61, 121, 0.14);
        }

        .action-button:focus-visible,
        .location-card:focus-visible {
            outline: none;
        }

        .list-meta {
            margin: 0;
            font-size: 0.92rem;
            color: var(--muted);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
            overflow-y: auto;
            padding-right: 0.25rem;
        }

        .location-card {
            background: var(--card-bg);
            padding: 1rem 1rem 0.95rem;
            border-radius: 18px;
            border: 2px solid #002a61;
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
        }

        .location-card:hover,
        .location-card:focus-visible,
        .location-card.active {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 42, 97, 0.16);
            border-color: #0d3d79;
        }

        .location-card h3 {
            margin: 0 0 0.35rem 0;
            font-size: 1.02rem;
            color: #001b3d;
        }

        .location-card p {
            margin: 0.15rem 0;
            font-size: 0.93rem;
            color: #1d3557;
        }

        .location-card .event-name {
            font-weight: 600;
            color: #0d3d79;
        }

        .location-card .event-meta {
            color: var(--muted);
            font-size: 0.88rem;
        }

        .location-card.unmapped {
            border-style: dashed;
            border-color: #7c8ca8;
            background: #f8fbff;
        }

        .location-card .status-chip {
            display: inline-flex;
            align-items: center;
            margin-top: 0.45rem;
            border-radius: 999px;
            padding: 0.22rem 0.6rem;
            font-size: 0.74rem;
            font-weight: 700;
            background: #dbeafe;
            color: #0d3d79;
        }

        .empty-state {
            background: rgba(255, 255, 255, 0.72);
            border: 2px dashed var(--border);
            border-radius: 18px;
            padding: 1rem;
            color: var(--muted);
        }

        #map {
            width: 100%;
            height: 100%;
            min-height: 60vh;
        }

        .map-legend {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.9);
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
            z-index: 500;
        }

        .hover-preview-panel {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: min(420px, calc(100% - 2rem));
            max-height: calc(100% - 7rem);
            overflow-y: auto;
            border-radius: 24px;
            background: rgba(10, 15, 28, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(16px);
            color: #f8fafc;
            opacity: 0;
            transform: translateX(12px);
            transition: opacity 120ms ease, transform 120ms ease;
            pointer-events: auto;
            z-index: 600;
        }

        .hover-preview-panel.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .hover-preview-media-wrap {
            min-height: 180px;
            max-height: 34vh;
            background: #111827;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .hover-preview-media {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .hover-preview-copy {
            padding: 1.25rem 1.4rem 1.5rem;
        }

        .hover-preview-kicker {
            font-size: 0.78rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #93c5fd;
            margin-bottom: 0.6rem;
            font-weight: 700;
        }

        .hover-preview-title {
            margin: 0 0 0.65rem;
            font-size: clamp(1.25rem, 2vw, 1.8rem);
            line-height: 1.1;
            color: #ffffff;
        }

        .hover-preview-source {
            margin: 0 0 0.8rem;
            color: #cbd5e1;
            font-weight: 600;
        }

        .hover-preview-location {
            margin-bottom: 0.85rem;
            font-size: 0.96rem;
            line-height: 1.55;
            color: #e2e8f0;
        }

        .hover-preview-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin-bottom: 1rem;
        }

        .hover-preview-tag {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 0.35rem 0.7rem;
            font-size: 0.76rem;
            font-weight: 700;
            background: var(--tag-chip-bg, #334155);
            color: var(--tag-chip-fg, #ffffff);
            border: 1px solid rgba(255, 255, 255, 0.22);
            cursor: ns-resize;
            user-select: none;
        }

        .hover-preview-tag[data-multi="true"] {
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
        }

        .tag-hover-rail {
            margin-bottom: 0.95rem;
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            background: rgba(15, 23, 42, 0.9);
            overflow: hidden;
        }

        .tag-hover-rail-header {
            padding: 0.5rem 0.75rem;
            font-size: 0.74rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #e2e8f0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.22);
            background: rgba(30, 41, 59, 0.75);
        }

        .tag-hover-rail-list {
            max-height: min(40vh, 260px);
            overflow-y: auto;
            overscroll-behavior: contain;
        }

        .tag-hover-option {
            padding: 0.5rem 0.75rem;
            border-left: 4px solid transparent;
            font-size: 0.82rem;
            color: #e2e8f0;
            line-height: 1.35;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        .tag-hover-option.active {
            background: rgba(51, 65, 85, 0.75);
            border-left-color: var(--tag-chip-bg, #94a3b8);
            color: #ffffff;
        }

        .hover-preview-description {
            font-size: 0.96rem;
            line-height: 1.55;
            color: #e2e8f0;
            white-space: pre-line;
        }

        .hover-preview-link {
            display: inline-flex;
            margin-top: 1rem;
            color: #7dd3fc;
            font-weight: 700;
            text-decoration: none;
        }

        .hover-preview-link:hover,
        .hover-preview-link:focus-visible {
            text-decoration: underline;
            outline: none;
        }

        @media (max-width: 900px) {
            .page-container {
                flex-direction: column;
            }

            .left-panel,
            .right-panel {
                width: 100%;
            }

            .left-panel {
                max-height: none;
            }

            .cards-grid {
                max-height: none;
            }

            #map {
                min-height: 40vh;
            }

            .hover-preview-panel {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Code Collective Event Map</h1>
        <p>Explore upcoming event locations and see where everything is happening.</p>
    </header>
    <div class="page-container">
        <section class="panel left-panel">
            <h2 class="section-title">Featured Event Locations</h2>
            <div class="controls-row">
                <input id="event-search" class="search-input" type="search" placeholder="Search events, locations, tags, or descriptions">
                <button id="copy-all-button" class="action-button" type="button">Copy all</button>
                <button id="copy-some-button" class="action-button" type="button">Copy some</button>
            </div>
            <p id="list-meta" class="list-meta">Loading events with location data.</p>
            <div id="location-cards" class="cards-grid"></div>
        </section>
        <section class="panel right-panel">
            <div id="map"></div>
            <aside id="hover-preview" class="hover-preview-panel" hidden>
                <div id="hover-preview-media-wrap" class="hover-preview-media-wrap" hidden>
                    <img id="hover-preview-media" class="hover-preview-media" alt="">
                </div>
                <div class="hover-preview-copy">
                    <div id="hover-preview-kicker" class="hover-preview-kicker"></div>
                    <h3 id="hover-preview-title" class="hover-preview-title"></h3>
                    <p id="hover-preview-source" class="hover-preview-source"></p>
                    <div id="hover-preview-location" class="hover-preview-location"></div>
                    <div id="hover-preview-tags" class="hover-preview-tags"></div>
                    <div id="tag-hover-rail" class="tag-hover-rail" hidden></div>
                    <div id="hover-preview-description" class="hover-preview-description"></div>
                    <a id="hover-preview-link" class="hover-preview-link" href="#" target="_blank" rel="noopener" hidden>Open event page</a>
                </div>
            </aside>
            <div class="map-legend">
                <strong>Map Tips</strong>
                <div>• Drag & zoom to explore</div>
                <div>• Hover a list item to preview details here</div>
                <div>• Click a list item to jump to its marker</div>
            </div>
        </section>
    </div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        crossorigin=""
    ></script>
    <script>
        const DEFAULT_CITY = 'hawaii';
        const DEFAULT_CENTER = [39.2904, -76.6122];
        const geocodeCache = {};
        const allEvents = [];
        const eventsWithCoords = [];
        const eventsWithoutCoords = [];
        const markersByEventKey = new Map();
        let fileGeocodeCache = {};
        let searchTerm = '';
        let activeHoverKey = '';
        const cityPathContext = resolveCityPath();
        const EVENTS_SOURCE = `${cityPathContext.basePath}/upcoming_events.json`;
        const GEOCODE_CACHE_URL = `${cityPathContext.basePath}/geocode_cache.json`;
        const CATEGORY_MAPS_INDEX_URL = '/data/category_maps/index.json';
        const LEGEND_PREFS_KEY = 'calendarLegendPrefs';
        const FALLBACK_CATEGORY_MAP_CONFIG = {
            default_map: 'community_sectors',
            maps: [
                {
                    id: 'maslow_needs',
                    label: 'Maslow Needs',
                    categories: [
                        { label: 'Food', color: '#ca8a04', text_color: '#ffffff', matches: ['Food'] },
                        { label: 'Water', color: '#0f766e', text_color: '#ffffff', matches: ['Water', 'Water & Environment'] },
                        { label: 'Shelter + Habitat', color: '#475569', text_color: '#ffffff', matches: ['Housing', 'Shelter + Habitat'] },
                        { label: 'Clothing', color: '#7c3aed', text_color: '#ffffff', matches: ['Clothing'] },
                        { label: 'Survival & Health', color: '#059669', text_color: '#ffffff', matches: ['Survival & Health', 'Wellness', 'Health'] },
                        { label: 'Safety & Stability', color: '#1d4ed8', text_color: '#ffffff', matches: ['Safety & Stability', 'Infrastructure', 'Finance'] },
                        { label: 'Belonging & Culture', color: '#9333ea', text_color: '#ffffff', matches: ['Belonging & Culture', 'Culture', 'Religion', 'Community'] },
                        { label: 'Esteem & Opportunity', color: '#b45309', text_color: '#ffffff', matches: ['Esteem & Opportunity', 'Economic Development', 'Economics', 'Business', 'Startup', 'Entrepreneurship', 'Career Growth', 'Professional Networking'] },
                        { label: 'Growth & Creativity', color: '#db2777', text_color: '#ffffff', matches: ['Growth & Creativity', 'Tech Skills', 'Makerspace'] },
                        { label: 'Purpose & Service', color: '#b91c1c', text_color: '#ffffff', matches: ['Purpose & Service', 'Politics'] },
                        { label: 'Other', color: '#6b7280', text_color: '#ffffff', matches: [] }
                    ]
                },
                {
                    id: 'community_sectors',
                    label: 'Community Sectors',
                    categories: [
                        { label: 'Technology', color: '#2563eb', text_color: '#ffffff', matches: ['Tech Skills', 'AI', 'Data Science', 'Cybersecurity', 'Cloud & Platform', 'DevOps', 'Software Development', 'Web Development', 'JavaScript', 'Python', 'Ruby', 'Product', 'UX', 'Game Development', 'Technical Writing', 'Open Source', 'Tech Community'] },
                        { label: 'Entrepreneurship', color: '#0ea5e9', text_color: '#ffffff', matches: ['Entrepreneurship', 'Business', 'Startup', 'Career Growth', 'Professional Networking'] },
                        { label: 'Economics', color: '#0d9488', text_color: '#ffffff', matches: ['Economics', 'Economic Development', 'Esteem & Opportunity'] },
                        { label: 'Finance', color: '#facc15', text_color: '#111827', matches: ['Finance', 'Crypto & Web3'] },
                        { label: 'Politics', color: '#dc2626', text_color: '#ffffff', matches: ['Politics', 'Civic Tech', 'Policy', 'Purpose & Service'] },
                        { label: 'Culture', color: '#7c3aed', text_color: '#ffffff', matches: ['Culture', 'Belonging & Culture', 'Community', 'Community Organizing', 'Code Collective & Partners', 'Tech Community'] },
                        { label: 'Faith', color: '#000000', text_color: '#ffffff', matches: ['Religion', 'Faith & Spirituality'] },
                        { label: 'Environment', color: '#16a34a', text_color: '#ffffff', matches: ['Water', 'Water & Environment', 'Climate & Energy', 'Energy', 'Infrastructure'] },
                        { label: 'Makerspace', color: '#ea580c', text_color: '#ffffff', matches: ['Makerspace', 'Robotics'] },
                        { label: 'Other', color: '#6b7280', text_color: '#ffffff', matches: [] }
                    ]
                },
                {
                    id: 'tech_only',
                    label: 'Tech Meetups',
                    categories: [
                        { label: 'AI & ML', color: '#7c3aed', text_color: '#ffffff', matches: ['AI'] },
                        { label: 'Data & Analytics', color: '#0891b2', text_color: '#ffffff', matches: ['Data Science'] },
                        { label: 'Cybersecurity', color: '#dc2626', text_color: '#ffffff', matches: ['Cybersecurity'] },
                        { label: 'Cloud & DevOps', color: '#2563eb', text_color: '#ffffff', matches: ['Cloud & Platform', 'DevOps'] },
                        { label: 'Software Development', color: '#4f46e5', text_color: '#ffffff', matches: ['Software Development', 'Web Development', 'JavaScript', 'Python', 'Ruby', 'Open Source', 'Technical Writing', 'Game Development'] },
                        { label: 'Design & Product', color: '#db2777', text_color: '#ffffff', matches: ['UX', 'Product'] },
                        { label: 'Crypto & Web3', color: '#a16207', text_color: '#ffffff', matches: ['Crypto & Web3'] },
                        { label: 'Makerspace & Robotics', color: '#ea580c', text_color: '#ffffff', matches: ['Makerspace', 'Robotics'] },
                        { label: 'Tech Meetups', color: '#16a34a', text_color: '#ffffff', matches: ['Tech Community', 'Code Collective & Partners'] },
                        { label: 'General Tech', color: '#475569', text_color: '#ffffff', matches: [] }
                    ]
                }
            ]
        };
        let activeCategoryMap = FALLBACK_CATEGORY_MAP_CONFIG.maps.find(map => map.id === FALLBACK_CATEGORY_MAP_CONFIG.default_map) || FALLBACK_CATEGORY_MAP_CONFIG.maps[0];
        let clearHoverTimer = 0;
        let activeTagRail = null;

        const map = L.map('map', {
            zoomControl: true
        }).setView(DEFAULT_CENTER, 11);

        function sanitizeCityName(value) {
            return (value || '')
                .toLowerCase()
                .replace(/[^a-z0-9\-\/]/g, '')
                .replace(/^\/+/, '')
                .replace(/\/+$/, '');
        }

        function resolveCityPath() {
            const params = new URLSearchParams(window.location.search);
            const requested = sanitizeCityName(params.get('city'));
            const fallback = sanitizeCityName(DEFAULT_CITY) || 'baltimore';
            const city = requested || fallback;
            return {
                city,
                basePath: `/${city}`
            };
        }

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        async function loadEvents() {
            try {
                await loadFileCache();
                await loadCategoryMapConfig();
                const response = await fetch(EVENTS_SOURCE);
                if (!response.ok) {
                    throw new Error('Failed to load upcoming events.');
                }

                const events = await response.json();
                allEvents.splice(0, allEvents.length, ...(Array.isArray(events) ? events : []));
                await plotEvents(allEvents);
                bindUiControls();
                renderCards(getFilteredEvents());
            } catch (error) {
                console.error(error);
                document.getElementById('location-cards').innerHTML =
                    '<div class="empty-state">Unable to load events right now. Please try again later.</div>';
                document.getElementById('list-meta').textContent = 'Event data could not be loaded.';
            }
        }

        async function loadFileCache() {
            try {
                const response = await fetch(GEOCODE_CACHE_URL, { cache: 'no-cache' });
                if (response.ok) {
                    fileGeocodeCache = await response.json();
                }
            } catch (error) {
                console.warn('Unable to load geocode cache file', error);
            }
        }

        function bindUiControls() {
            const searchInput = document.getElementById('event-search');
            const copyAllButton = document.getElementById('copy-all-button');
            const copySomeButton = document.getElementById('copy-some-button');
            const previewPanel = document.getElementById('hover-preview');

            if (!searchInput.dataset.bound) {
                searchInput.addEventListener('input', event => {
                    searchTerm = event.target.value.trim().toLowerCase();
                    renderCards(getFilteredEvents());
                });
                searchInput.dataset.bound = 'true';
            }

            if (!copyAllButton.dataset.bound) {
                copyAllButton.addEventListener('click', async () => {
                    const text = formatEventListForClipboard(getFilteredEvents(), 'All listed events');
                    await copyTextToClipboard(text);
                    flashButtonLabel(copyAllButton, 'Copied');
                });
                copyAllButton.dataset.bound = 'true';
            }

            if (!copySomeButton.dataset.bound) {
                copySomeButton.addEventListener('click', async () => {
                    const listed = getFilteredEvents().slice(0, 5);
                    const dropped = eventsWithoutCoords.slice(0, 5);
                    const text = [
                        formatEventListForClipboard(listed, 'Listed events (5)'),
                        formatDroppedListForClipboard(dropped, 'Could not be displayed (5)')
                    ].join('\n\n');
                    await copyTextToClipboard(text);
                    flashButtonLabel(copySomeButton, 'Copied');
                });
                copySomeButton.dataset.bound = 'true';
            }

            if (!previewPanel.dataset.bound) {
                previewPanel.addEventListener('mouseenter', cancelClearHoverPreview);
                previewPanel.addEventListener('mouseleave', scheduleClearHoverPreview);
                previewPanel.dataset.bound = 'true';
            }
        }

        function flashButtonLabel(button, label) {
            const original = button.textContent;
            button.textContent = label;
            window.setTimeout(() => {
                button.textContent = original;
            }, 1500);
        }

        function renderCards(events) {
            const container = document.getElementById('location-cards');
            const meta = document.getElementById('list-meta');
            meta.textContent = `${events.length} of ${allEvents.length} events shown. ${eventsWithoutCoords.length} could not be displayed on the map.`;

            if (events.length === 0) {
                container.innerHTML = '<div class="empty-state">No events match this search.</div>';
                clearHoverPreview();
                return;
            }

            container.innerHTML = '';
            events.forEach(evt => {
                const card = document.createElement('article');
                card.className = 'location-card';
                if (!evt.coords) {
                    card.classList.add('unmapped');
                }
                card.tabIndex = 0;
                card.dataset.eventKey = getEventKey(evt);
                card.innerHTML = `
                    <h3>${escapeHtml(evt.name || 'Untitled')}</h3>
                    <p class="event-name">${escapeHtml(getEventLocationKey(evt) || 'Address unavailable')}</p>
                    <p class="event-meta">${escapeHtml(formatDate(evt.startDate) || 'Time unavailable')}</p>
                    <p>${escapeHtml(getEventLocationLabel(evt))}</p>
                    ${evt.coords ? '' : '<div class="status-chip">Not mapped</div>'}
                `;
                card.addEventListener('mouseenter', () => activateEventPreview(evt));
                card.addEventListener('focus', () => activateEventPreview(evt));
                card.addEventListener('mouseleave', scheduleClearHoverPreview);
                card.addEventListener('click', () => focusEventOnMap(evt));
                card.addEventListener('keydown', event => {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        focusEventOnMap(evt);
                    }
                });
                container.appendChild(card);
            });
        }

        function getFilteredEvents() {
            const sorted = [...allEvents].sort((a, b) => {
                const aTime = new Date(a.startDate || 0).getTime();
                const bTime = new Date(b.startDate || 0).getTime();
                return aTime - bTime;
            });
            if (!searchTerm) {
                return sorted;
            }
            return sorted.filter(matchesSearchTerm);
        }

        function matchesSearchTerm(evt) {
            const haystack = [
                evt.name,
                evt.description,
                evt.url,
                evt.location?.name,
                evt.location?.address,
                evt.location?.city,
                evt.location?.state,
                ...(Array.isArray(evt.tags) ? evt.tags : [])
            ].filter(Boolean).join(' ').toLowerCase();
            return haystack.includes(searchTerm);
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            if (Number.isNaN(date.getTime())) {
                return '';
            }
            return date.toLocaleString(undefined, {
                weekday: 'short',
                month: 'short',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                timeZoneName: 'short'
            });
        }

        function normalizeAddressKey(address) {
            return (address || '').trim().toLowerCase();
        }

        function normalizeCoordinateValue(value) {
            if (value === null || value === undefined || value === '') {
                return null;
            }
            const numeric = Number(value);
            return Number.isFinite(numeric) ? numeric : null;
        }

        function coerceCoords(value) {
            if (!value || typeof value !== 'object') {
                return null;
            }

            const lat = normalizeCoordinateValue(value.lat ?? value.latitude);
            const lng = normalizeCoordinateValue(value.lng ?? value.longitude ?? value.lon);
            if (lat === null || lng === null) {
                return null;
            }

            return { lat, lng };
        }

        function getEventLocationKey(evt) {
            const loc = evt?.location || {};
            return String(loc.address || loc.name || '').trim();
        }

        function getEventLocationLabel(evt) {
            const loc = evt?.location || {};
            return String(loc.name || loc.address || evt?.name || 'Event location').trim();
        }

        function getEventKey(evt) {
            return String(evt?.id || `${evt?.name || ''}|${evt?.startDate || ''}|${getEventLocationKey(evt)}`);
        }

        function getCachedGeocode(key) {
            if (geocodeCache[key]) {
                return geocodeCache[key];
            }
            try {
                const stored = localStorage.getItem(key);
                if (stored) {
                    const parsed = JSON.parse(stored);
                    geocodeCache[key] = parsed;
                    return parsed;
                }
            } catch (err) {
                console.warn('Local storage unavailable', err);
            }
            return null;
        }

        function getFileCacheCoords(address) {
            const key = normalizeAddressKey(address);
            return fileGeocodeCache[key] || null;
        }

        async function plotEvents(events) {
            eventsWithCoords.length = 0;
            eventsWithoutCoords.length = 0;
            markersByEventKey.clear();
            const markers = [];

            for (const evt of events) {
                const coords = await getEventCoordinates(evt);
                if (!coords) {
                    eventsWithoutCoords.push(evt);
                    continue;
                }

                const eventWithCoords = { ...evt, coords };
                eventsWithCoords.push(eventWithCoords);
                evt.coords = coords;

                const marker = L.marker([coords.lat, coords.lng]).addTo(map);
                marker.bindPopup(`
                    <strong>${escapeHtml(evt.name || 'Untitled')}</strong><br>
                    ${escapeHtml(getEventLocationKey(evt) || 'Address on RSVP')}<br>
                    ${escapeHtml(formatDate(evt.startDate) || '')}
                `);
                marker.on('mouseover', () => activateEventPreview(eventWithCoords));
                marker.on('mouseout', scheduleClearHoverPreview);
                markersByEventKey.set(getEventKey(eventWithCoords), marker);
                markers.push(marker);
            }

            if (markers.length > 0) {
                const group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.2));
            } else {
                map.setView(DEFAULT_CENTER, 11);
            }
        }

        async function getEventCoordinates(evt) {
            const loc = evt.location || {};
            const directCoords = coerceCoords(loc);
            if (directCoords) {
                return directCoords;
            }

            const locationKey = getEventLocationKey(evt);
            if (!locationKey) {
                return null;
            }

            const fileCached = coerceCoords(getFileCacheCoords(locationKey));
            if (fileCached) {
                return fileCached;
            }

            const cacheKey = `eventsmap:${normalizeAddressKey(locationKey)}`;
            const cached = coerceCoords(getCachedGeocode(cacheKey));
            if (cached) {
                return cached;
            }

            return null;
        }

        function activateEventPreview(evt) {
            cancelClearHoverPreview();
            activeHoverKey = getEventKey(evt);
            syncActiveCard();
            showHoverPreview(evt);
        }

        function syncActiveCard() {
            document.querySelectorAll('.location-card').forEach(card => {
                card.classList.toggle('active', card.dataset.eventKey === activeHoverKey);
            });
        }

        function showHoverPreview(evt) {
            const panel = document.getElementById('hover-preview');
            const mediaWrap = document.getElementById('hover-preview-media-wrap');
            const media = document.getElementById('hover-preview-media');
            const kicker = document.getElementById('hover-preview-kicker');
            const title = document.getElementById('hover-preview-title');
            const source = document.getElementById('hover-preview-source');
            const location = document.getElementById('hover-preview-location');
            const tags = document.getElementById('hover-preview-tags');
            const description = document.getElementById('hover-preview-description');
            const link = document.getElementById('hover-preview-link');
            const imageUrl = getPreferredImage(evt);

            kicker.textContent = formatDate(evt.startDate) || 'Time unavailable';
            title.textContent = evt.name || 'Untitled';
            source.textContent = getSourceLabel(evt);
            location.textContent = getEventLocationKey(evt) || 'Address unavailable';
            const rawTags = Array.isArray(evt.tags) ? evt.tags : [];
            tags.innerHTML = rawTags.map(tag => {
                const visual = getTagVisual(tag);
                const matches = getEventsByTag(tag);
                return `<span class="hover-preview-tag" data-tag="${escapeAttr(tag)}" data-multi="${matches.length > 1 ? 'true' : 'false'}" style="--tag-chip-bg:${escapeAttr(visual.bg)}; --tag-chip-fg:${escapeAttr(visual.fg)};">${escapeHtml(tag)}</span>`;
            }).join('');
            description.textContent = evt.description || 'No description available.';
            bindTagHoverInteractions(rawTags, evt);

            if (imageUrl) {
                mediaWrap.hidden = false;
                media.src = imageUrl;
                media.alt = evt.name || 'Event image';
            } else {
                mediaWrap.hidden = true;
                media.removeAttribute('src');
                media.alt = '';
            }

            if (evt.url) {
                link.hidden = false;
                link.href = evt.url;
            } else {
                link.hidden = true;
                link.removeAttribute('href');
            }

            panel.hidden = false;
            panel.classList.add('visible');
        }

        function scheduleClearHoverPreview() {
            cancelClearHoverPreview();
            clearHoverTimer = window.setTimeout(() => {
                clearHoverPreview();
            }, 650);
        }

        function cancelClearHoverPreview() {
            if (!clearHoverTimer) {
                return;
            }
            window.clearTimeout(clearHoverTimer);
            clearHoverTimer = 0;
        }

        function clearHoverPreview() {
            cancelClearHoverPreview();
            hideTagHoverRail();
            activeHoverKey = '';
            syncActiveCard();
            const panel = document.getElementById('hover-preview');
            panel.classList.remove('visible');
            panel.hidden = true;
        }

        function bindTagHoverInteractions(rawTags, activeEvent) {
            const container = document.getElementById('hover-preview-tags');
            if (!rawTags.length) {
                hideTagHoverRail();
                return;
            }

            container.querySelectorAll('.hover-preview-tag').forEach(chip => {
                const rawTag = chip.dataset.tag || '';
                const matches = getEventsByTag(rawTag);
                chip.addEventListener('mouseenter', event => {
                    if (matches.length > 6) {
                        const activeIndex = Math.max(0, matches.findIndex(candidate => getEventKey(candidate) === getEventKey(activeEvent)));
                        showTagHoverRail(rawTag, matches, activeIndex);
                        previewEventFromTagRail(rawTag, matches, activeIndex);
                        return;
                    }

                    if (matches.length > 1) {
                        const activeIndex = getVerticalIndexForTarget(event, matches.length);
                        previewEventFromTagRail(rawTag, matches, activeIndex);
                    } else {
                        hideTagHoverRail();
                    }
                });
                chip.addEventListener('mousemove', event => {
                    if (matches.length <= 1) {
                        return;
                    }
                    if (matches.length > 6) {
                        if (!activeTagRail || activeTagRail.tag !== rawTag) {
                            showTagHoverRail(rawTag, matches, 0);
                        }
                        return;
                    }
                    const activeIndex = getVerticalIndexForTarget(event, matches.length);
                    previewEventFromTagRail(rawTag, matches, activeIndex);
                });
            });
        }

        function showTagHoverRail(tag, events, activeIndex) {
            if (!events || !events.length) {
                hideTagHoverRail();
                return;
            }
            const rail = document.getElementById('tag-hover-rail');
            const visual = getTagVisual(tag);
            const heading = `${tag} (${events.length} events)`;
            rail.innerHTML = `
                <div class="tag-hover-rail-header" style="--tag-chip-bg:${escapeAttr(visual.bg)};">Hover vertically to preview: ${escapeHtml(heading)}</div>
                <div class="tag-hover-rail-list">
                    ${events.map((evt, idx) => `<div class="tag-hover-option ${idx === activeIndex ? 'active' : ''}" data-index="${idx}" style="--tag-chip-bg:${escapeAttr(visual.bg)};">${escapeHtml(evt.name || 'Untitled')}</div>`).join('')}
                </div>
            `;
            rail.hidden = false;
            activeTagRail = {
                tag,
                events,
                activeIndex
            };
            const list = rail.querySelector('.tag-hover-rail-list');
            list.addEventListener('mousemove', event => {
                if (!activeTagRail || activeTagRail.tag !== tag) {
                    return;
                }
                const nextIndex = getVerticalIndexFromScrollable(event, list, activeTagRail.events.length);
                previewEventFromTagRail(activeTagRail.tag, activeTagRail.events, nextIndex);
            });
            list.addEventListener('mouseleave', () => {
                if (!activeTagRail) {
                    return;
                }
                setTagRailActiveOption(activeTagRail.activeIndex);
            });
            list.addEventListener('click', event => {
                const target = event.target.closest('.tag-hover-option');
                if (!target || !activeTagRail) {
                    return;
                }
                const nextIndex = Number(target.dataset.index);
                if (!Number.isFinite(nextIndex)) {
                    return;
                }
                previewEventFromTagRail(activeTagRail.tag, activeTagRail.events, nextIndex, true);
            });
        }

        function hideTagHoverRail() {
            const rail = document.getElementById('tag-hover-rail');
            rail.hidden = true;
            rail.innerHTML = '';
            activeTagRail = null;
        }

        function previewEventFromTagRail(tag, events, index, pinOnMap = false) {
            if (!events || !events.length) {
                return;
            }
            const boundedIndex = Math.max(0, Math.min(events.length - 1, index));
            const nextEvent = events[boundedIndex];
            const nextKey = getEventKey(nextEvent);
            setTagRailActiveOption(boundedIndex);

            if (activeHoverKey === nextKey && !pinOnMap) {
                return;
            }

            activeHoverKey = nextKey;
            syncActiveCard();
            showHoverPreview(nextEvent);
            showTagHoverRail(tag, events, boundedIndex);
            if (pinOnMap) {
                focusEventOnMap(nextEvent);
            }
        }

        function setTagRailActiveOption(index) {
            const rail = document.getElementById('tag-hover-rail');
            rail.querySelectorAll('.tag-hover-option').forEach(option => {
                const optionIndex = Number(option.dataset.index);
                option.classList.toggle('active', optionIndex === index);
                if (optionIndex === index) {
                    option.scrollIntoView({ block: 'nearest' });
                }
            });
            if (activeTagRail) {
                activeTagRail.activeIndex = index;
            }
        }

        function getVerticalIndexForTarget(event, count) {
            const rect = event.currentTarget.getBoundingClientRect();
            const offset = Math.max(0, Math.min(rect.height, event.clientY - rect.top));
            const ratio = rect.height <= 0 ? 0 : offset / rect.height;
            return Math.max(0, Math.min(count - 1, Math.floor(ratio * count)));
        }

        function getVerticalIndexFromScrollable(event, listElement, count) {
            const rect = listElement.getBoundingClientRect();
            const localY = Math.max(0, Math.min(rect.height, event.clientY - rect.top));
            const virtualY = localY + listElement.scrollTop;
            const total = Math.max(1, listElement.scrollHeight);
            const ratio = virtualY / total;
            return Math.max(0, Math.min(count - 1, Math.floor(ratio * count)));
        }

        function slugifyTag(tag) {
            return String(tag || '')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        function normalizeMapCategory(category) {
            return {
                label: category.label,
                color: category.color || '#475569',
                textColor: category.text_color || '#ffffff',
                slug: slugifyTag(category.label),
                matchSlugs: new Set((category.matches || []).map(slugifyTag).filter(Boolean))
            };
        }

        function getOtherCategory(categoryMap) {
            return (categoryMap?.categories || [])
                .map(normalizeMapCategory)
                .find(category => category.slug === 'other') || null;
        }

        function getMappedCategoryForTag(rawTag) {
            const slug = slugifyTag(rawTag);
            if (!slug) {
                return getOtherCategory(activeCategoryMap);
            }
            const mapped = (activeCategoryMap?.categories || [])
                .map(normalizeMapCategory)
                .find(category => category.matchSlugs.has(slug));
            return mapped || getOtherCategory(activeCategoryMap);
        }

        function getTagVisual(rawTag) {
            const mapped = getMappedCategoryForTag(rawTag);
            return {
                bg: mapped?.color || '#334155',
                fg: mapped?.textColor || '#ffffff'
            };
        }

        function getEventsByTag(rawTag) {
            const target = slugifyTag(rawTag);
            if (!target) {
                return [];
            }
            return getFilteredEvents().filter(evt => {
                const tags = Array.isArray(evt.tags) ? evt.tags : [];
                return tags.some(tag => slugifyTag(tag) === target);
            });
        }

        async function loadCategoryMapConfig() {
            try {
                const indexResponse = await fetch(CATEGORY_MAPS_INDEX_URL, { cache: 'no-store' });
                if (!indexResponse.ok) {
                    throw new Error(`Category map index HTTP ${indexResponse.status}`);
                }
                const indexData = await indexResponse.json();
                const refs = Array.isArray(indexData.maps) ? indexData.maps : [];
                if (!refs.length) {
                    return;
                }
                const loadedMaps = await Promise.all(refs.map(async ref => {
                    if (!ref?.path) {
                        return null;
                    }
                    const response = await fetch(ref.path, { cache: 'no-store' });
                    if (!response.ok) {
                        throw new Error(`Category map ${ref.id || ref.path} HTTP ${response.status}`);
                    }
                    const payload = await response.json();
                    if (!Array.isArray(payload?.categories)) {
                        return null;
                    }
                    return {
                        id: payload.id || ref.id || '',
                        label: payload.label || ref.label || payload.id || ref.id || 'Map',
                        categories: payload.categories
                    };
                }));
                const maps = loadedMaps.filter(Boolean);
                if (!maps.length) {
                    return;
                }
                const storedPrefs = JSON.parse(localStorage.getItem(LEGEND_PREFS_KEY) || '{}');
                const preferredMapId = storedPrefs?.mapId || indexData.default_map;
                activeCategoryMap = maps.find(map => map.id === preferredMapId) || maps.find(map => map.id === indexData.default_map) || maps[0];
            } catch (error) {
                console.warn('Falling back to built-in category map for event tags:', error);
            }
        }

        function focusEventOnMap(evt) {
            const marker = markersByEventKey.get(getEventKey(evt));
            if (!marker || !evt.coords) {
                activateEventPreview(evt);
                return;
            }
            map.flyTo([evt.coords.lat, evt.coords.lng], 14, {
                duration: 0.75
            });
            marker.openPopup();
            activateEventPreview(evt);
        }

        function getSourceLabel(evt) {
            const value = evt?.source_url || evt?.source || evt?.url || '';
            if (!value) {
                return 'Source unavailable';
            }
            try {
                return new URL(value, window.location.origin).hostname.replace(/^www\./, '');
            } catch (error) {
                return value;
            }
        }

        function getPreferredImage(evt) {
            return evt?.imageUrl || evt?.orgImageUrl || '';
        }

        async function copyTextToClipboard(text) {
            if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(text);
                return;
            }

            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            textarea.remove();
        }

        function formatEventListForClipboard(events, heading) {
            if (!events.length) {
                return `${heading}\n- None`;
            }
            return `${heading}\n${events.map(evt => formatEventLine(evt)).join('\n')}`;
        }

        function formatDroppedListForClipboard(events, heading) {
            if (!events.length) {
                return `${heading}\n- None`;
            }
            return `${heading}\n${events.map(evt => formatEventLine(evt, true)).join('\n')}`;
        }

        function formatEventLine(evt, dropped = false) {
            const parts = [
                evt.name || 'Untitled event',
                formatDate(evt.startDate) || 'Time unavailable',
                getEventLocationKey(evt) || 'Address unavailable'
            ];
            if (dropped) {
                parts.push('Could not be displayed on map/list');
            }
            if (evt.url) {
                parts.push(evt.url);
            }
            return `- ${parts.join(' | ')}`;
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escapeAttr(value) {
            return escapeHtml(value).replace(/`/g, '&#96;');
        }

        loadEvents();
    </script>
</body>
</html>
