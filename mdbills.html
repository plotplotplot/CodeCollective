  <style>
    :root {
      --bills-font-size: 14px;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    #wrapper,
    #main {
      height: 100%;
      overflow: hidden;
    }

    .bills-shell {
      max-width: 100%;
      margin: 0 auto;
      height: calc(100vh - 76px);
      padding: 12px 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bills-titlebar {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
      flex-wrap: wrap;
      margin: 0;
    }

    .bills-titlebar h1 {
      margin: 0;
      font-size: clamp(1.15rem, 1.95vw, 1.65rem);
      line-height: 1.2;
      border: 0 !important;
    }

    .toolbar-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      align-items: center;
    }

    .panel-header-right {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .header-check {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.9);
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      text-transform: none;
      font-weight: 600;
      user-select: none;
    }

    .header-check input[type="checkbox"] {
      margin: 0;
      width: 15px;
      height: 15px;
      accent-color: #ffcf66;
      cursor: pointer;
    }

    .font-size-controls {
      display: flex;
      gap: 3px;
      align-items: center;
    }

    .font-size-btn {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      padding: 4px 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
      min-width: 24px;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .font-size-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.35);
    }

    .font-size-btn:focus {
      outline: 2px solid #ffcf66;
      outline-offset: 2px;
    }

    .font-size-btn:active {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Column-specific font sizes */
    #sponsor-column {
      --column-font-size: 14px;
    }

    #category-column {
      --column-font-size: 14px;
    }

    #bills-column {
      --column-font-size: 14px;
    }

    #sponsor-column .list-panel-body,
    #sponsor-column .list-panel-body .sponsor-button,
    #sponsor-column .list-panel-body .list-count {
      font-size: var(--column-font-size);
    }

    #category-column .list-panel-body,
    #category-column .list-panel-body .sponsor-button,
    #category-column .list-panel-body .list-count {
      font-size: var(--column-font-size);
    }

    #bills-column .bills-table-wrap,
    #bills-column .bills-table-wrap .bill-title,
    #bills-column .bills-table-wrap .bill-title-button,
    #bills-column .bills-table-wrap .bill-sponsor-button,
    #bills-column .bills-table-wrap td,
    #bills-column .bills-table-wrap th {
      font-size: var(--column-font-size);
    }

    .toolbar-reset {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font: inherit;
      cursor: pointer;
    }

    .bills-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      align-items: center;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.95rem;
    }

    .status-message {
      margin: 0;
      color: #fff;
      min-height: 1.25rem;
      font-size: 0.9rem;
    }

    .insights-grid {
      display: grid;
      gap: 20px;
      grid-template-columns: minmax(240px, 1fr) minmax(240px, 1fr) minmax(0, 2fr);
      margin: 0;
      align-items: stretch;
      flex: 1;
      min-height: 0;
    }

    .column-panel {
      position: relative;
      isolation: isolate;
      padding: 16px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.32);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .column-search {
      width: 100%;
      margin: 0 0 10px;
      padding: 10px 38px 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 0.92rem;
    }

    .column-search::placeholder {
      color: rgba(255, 255, 255, 0.62);
    }

    .search-wrap {
      position: relative;
      margin: 0 0 10px;
    }

    .search-wrap .column-search {
      margin: 0;
    }

    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      appearance: none;
      border: 0;
      background: transparent;
      color: rgba(255, 255, 255, 0.75);
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 6px;
      opacity: 0;
      pointer-events: none;
    }

    .search-clear.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .list-panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 0 0 10px;
      margin: 0 0 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.16);
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .list-panel-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
    }

    .list-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    #sponsor-column .list-row,
    #category-column .list-row {
      padding-top: 0;
      padding-bottom: 0;
    }

    .list-row-active-filter {
      margin-bottom: 10px;
      padding: 10px 12px !important;
      border: 1px solid rgba(255, 212, 95, 0.55);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255, 212, 95, 0.96), rgba(232, 177, 27, 0.96));
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
      color: #221400;
    }

    .active-filter-summary {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1;
    }

    .active-filter-label {
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(34, 20, 0, 0.7);
    }

    .active-filter-value {
      min-width: 0;
      font-size: 0.96rem;
      font-weight: 700;
      line-height: 1.25;
      color: #221400;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .active-filter-clear {
      appearance: none;
      border: 1px solid rgba(34, 20, 0, 0.22);
      border-radius: 999px;
      padding: 6px 12px;
      background: rgba(255, 248, 220, 0.72);
      color: #221400;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      transition: background 0.14s ease, transform 0.14s ease;
      flex-shrink: 0;
    }

    .active-filter-clear:hover,
    .active-filter-clear:focus-visible {
      background: rgba(255, 248, 220, 0.96);
      transform: translateY(-1px);
      outline: none;
    }

    .list-count {
      width: 72px;
      min-width: 72px;
      text-align: right;
      white-space: nowrap;
      color: rgba(255, 255, 255, 0.9);
    }

    .list-row .sponsor-button {
      flex: 1;
      min-width: 0;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sponsor-button {
      appearance: none;
      display: inline-block;
      max-width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: inherit;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }

    .sponsor-button.active {
      background: #ffcf66;
      color: #10151f;
      font-weight: 700;
      border-color: #ffcf66;
    }

    .bills-table-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
    }

    .column-panel,
    .list-panel-body,
    .bills-table-wrap,
    .bill-modal-dialog {
      scrollbar-width: thin;
      scrollbar-color: #ffcf66 rgba(255, 255, 255, 0.08);
    }

    .column-panel::-webkit-scrollbar,
    .list-panel-body::-webkit-scrollbar,
    .bills-table-wrap::-webkit-scrollbar,
    .bill-modal-dialog::-webkit-scrollbar {
      width: 14px;
      height: 14px;
    }

    .column-panel::-webkit-scrollbar-button,
    .list-panel-body::-webkit-scrollbar-button,
    .bills-table-wrap::-webkit-scrollbar-button,
    .bill-modal-dialog::-webkit-scrollbar-button {
      display: none;
      width: 0;
      height: 0;
    }

    .column-panel::-webkit-scrollbar-track,
    .list-panel-body::-webkit-scrollbar-track,
    .bills-table-wrap::-webkit-scrollbar-track,
    .bill-modal-dialog::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .column-panel::-webkit-scrollbar-thumb,
    .list-panel-body::-webkit-scrollbar-thumb,
    .bills-table-wrap::-webkit-scrollbar-thumb,
    .bill-modal-dialog::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #ffd978 0%, #ffcf66 55%, #ffbe3b 100%);
      border-radius: 999px;
      border: 2px solid rgba(14, 22, 45, 0.55);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.24);
    }

    .column-panel::-webkit-scrollbar-thumb:hover,
    .list-panel-body::-webkit-scrollbar-thumb:hover,
    .bills-table-wrap::-webkit-scrollbar-thumb:hover,
    .bill-modal-dialog::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #ffe08f 0%, #ffd267 55%, #ffc13f 100%);
    }

    .bills-table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(17, 34, 73, 0.94), rgba(5, 12, 28, 0.95));
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .bills-table th,
    .bills-table td {
      padding: 12px 10px;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 0.98rem;
      line-height: 1.3;
    }

    .bills-table th {
      color: rgba(255, 255, 255, 0.75);
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      white-space: nowrap;
      position: sticky;
      top: 0;
      background: rgba(8, 18, 42, 0.98);
      z-index: 1;
    }

    .bills-table th.sortable {
      cursor: pointer;
      user-select: none;
      transition: color 0.15s ease;
    }

    .bills-table th.sortable:hover {
      color: #ffcf66;
    }

    .bills-table th.sortable:focus {
      outline: 2px solid #ffcf66;
      outline-offset: -2px;
    }

    .bills-table th.resizable {
      position: relative;
    }

    .bills-table th.resizable .resize-handle {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      cursor: col-resize;
      background: transparent;
      z-index: 2;
    }

    .bills-table th.resizable .resize-handle:hover,
    .bills-table th.resizable .resize-handle.resizing {
      background: rgba(255, 207, 102, 0.4);
    }

    .bills-table th.resizable:last-child .resize-handle {
      display: none;
    }

    .sort-indicator {
      display: inline-block;
      width: 0;
      height: 0;
      margin-left: 6px;
      vertical-align: middle;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .bills-table th.sort-asc .sort-indicator {
      opacity: 1;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-bottom: 5px solid #ffcf66;
    }

    .bills-table th.sort-desc .sort-indicator {
      opacity: 1;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid #ffcf66;
    }

    .bills-table tr:last-child td {
      border-bottom: 0;
    }

    .bill-number-cell {
      white-space: nowrap;
      font-weight: 700;
      color: #ffcf66;
    }

    .bill-title {
      margin: 0;
      font-weight: 600;
      line-height: 1.3;
      font-size: inherit;
    }

    .bill-title-button {
      appearance: none;
      border: 0;
      padding: 0;
      background: transparent;
      color: #fff;
      text-align: left;
      cursor: pointer;
      font: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
      font-size: 1rem;
      line-height: 1.3;
    }

    .bill-sponsor-button {
      appearance: none;
      border: 0;
      padding: 0;
      background: transparent;
      color: #fff;
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      font: inherit;
      text-align: left;
      font-size: 1rem;
      line-height: 1.3;
    }

    .bill-status-cell {
      font-weight: 700;
      color: #f8fafc;
      border-radius: 6px;
      padding: 6px 8px;
      display: inline-block;
      min-width: 42px;
      text-align: center;
    }

    .bill-status-passed {
      background: #14532d;
    }

    .bill-status-not-passed {
      background: #991b1b;
    }

    .hover-card {
      position: fixed;
      top: 0;
      left: 0;
      width: min(360px, calc(100vw - 20px));
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: linear-gradient(180deg, rgba(14, 29, 61, 0.98), rgba(6, 14, 30, 0.98));
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.48);
      z-index: 9998;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.12s ease, transform 0.12s ease;
      color: #fff;
      text-align: left;
    }

    .hover-card.open {
      opacity: 1;
      transform: translateY(0);
    }

    .hover-card-content {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.14s ease, transform 0.14s ease;
    }

    .hover-card.is-swapping .hover-card-content {
      opacity: 0.28;
      transform: translateY(2px);
    }

    .hover-card.left-overlay {
      width: min(50vw, calc(100vw - 20px));
      max-width: 760px;
      min-width: 380px;
      z-index: 9999;
      overflow: auto;
      border-radius: 14px;
    }

    .hover-card.right-overlay {
      width: min(50vw, calc(100vw - 20px));
      max-width: 760px;
      min-width: 380px;
      z-index: 9999;
      overflow: auto;
      border-radius: 14px;
    }

    .hover-card h3 {
      margin: 0 0 6px;
      font-size: 1.5rem;
      line-height: 1.3;
      border: 0 !important;
    }

    .hover-card p {
      margin: 0 0 6px;
      font-size: 1.16rem;
      line-height: 1.4;
      text-indent: 0;
    }

    .hover-card p:last-child {
      margin-bottom: 0;
    }

    .hover-card.left-overlay h3 {
      font-size: calc(var(--bills-font-size) * 1.5);
    }

    .hover-card.left-overlay p {
      font-size: calc(var(--bills-font-size) * 1.16);
    }

    .hover-card.left-overlay .hover-card-kicker {
      font-size: calc(var(--bills-font-size) * 0.94);
    }

    .hover-card-kicker {
      margin: 0 0 6px;
      font-size: 0.94rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.72);
    }

    .hover-card-meta {
      color: rgba(255, 255, 255, 0.85);
    }

    .hover-card-meta-accent {
      color: #ffd45f;
      font-weight: 700;
    }

    .hover-card img {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      background: rgba(0, 0, 0, 0.18);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      margin: 8px 0 6px;
      display: block;
    }

    .hover-card-images {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .hover-card-images figure {
      margin: 0;
    }

    .hover-card-images figcaption {
      margin-top: 2px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.78);
    }

    .hover-card-images.sponsor-hover-media {
      position: relative;
      display: block;
      margin-top: 10px;
      height: min(64vh, 640px);
      min-height: 260px;
    }

    .hover-card-images.sponsor-hover-media .hover-map-figure {
      margin: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .hover-card-images.sponsor-hover-media .hover-map-image {
      width: 100%;
      height: 100%;
      max-height: none;
      object-fit: contain;
      background: transparent;
      margin: 0;
      flex: 1;
    }

    .hover-card-images.sponsor-hover-media .hover-map-figure figcaption {
      margin-top: 6px;
    }

    .hover-card-images.sponsor-hover-media .hover-portrait-overlay {
      position: absolute;
      top: 8px;
      right: 8px;
      width: min(26%, 170px);
      max-width: 170px;
      min-width: 80px;
      margin: 0;
      pointer-events: none;
      z-index: 2;
    }

    .hover-card-images.sponsor-hover-media .hover-portrait-image {
      width: 100%;
      height: auto;
      max-height: 170px;
      object-fit: cover;
      margin: 0;
      border: 2px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.45);
      background: rgba(6, 14, 30, 0.88);
    }

    .bill-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.72);
      z-index: 9999;
    }

    .bill-modal.open {
      display: flex;
    }

    .bill-modal-dialog {
      width: min(960px, 100%);
      max-height: 90vh;
      overflow: auto;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: linear-gradient(180deg, rgba(17, 34, 73, 0.98), rgba(5, 12, 28, 0.98));
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      padding: 18px;
      font-size: var(--bills-font-size);
    }

    #bill-modal .bill-modal-dialog,
    #bill-modal .bill-modal-dialog * {
      color: #fff !important;
    }

    .bill-modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .bill-modal-head h2 {
      margin: 0;
      font-size: calc(var(--bills-font-size) * 1.25);
      line-height: 1.35;
    }

    .bill-modal-close {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      padding: 8px 10px;
      cursor: pointer;
      font: inherit;
    }

    .bill-modal-links {
      display: grid;
      gap: 12px;
      margin: 0 0 18px;
    }

    .bill-modal-link {
      display: block;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 212, 95, 0.42);
      background: linear-gradient(180deg, rgba(255, 212, 95, 0.18), rgba(255, 166, 0, 0.1));
      text-decoration: none;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.18);
      transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease;
    }

    .bill-modal-link:hover,
    .bill-modal-link:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(255, 222, 132, 0.72);
      background: linear-gradient(180deg, rgba(255, 212, 95, 0.28), rgba(255, 166, 0, 0.14));
      outline: none;
    }

    .bill-modal-link-primary {
      border-color: rgba(255, 212, 95, 0.82);
      background: linear-gradient(180deg, rgba(255, 212, 95, 0.34), rgba(255, 166, 0, 0.2));
      box-shadow: 0 18px 30px rgba(255, 183, 0, 0.14);
    }

    .bill-modal-link-label {
      display: block;
      margin-bottom: 4px;
      font-size: calc(var(--bills-font-size) * 0.98);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .bill-modal-link-url {
      display: block;
      color: rgba(255, 255, 255, 0.82);
      font-size: calc(var(--bills-font-size) * 0.88);
      line-height: 1.35;
      word-break: break-all;
    }

    .bill-detail-table {
      width: 100%;
      border-collapse: collapse;
    }

    .bill-detail-table th,
    .bill-detail-table td {
      padding: 10px 8px;
      vertical-align: top;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .bill-detail-table th {
      width: 220px;
      color: rgba(255, 255, 255, 0.75);
      font-size: calc(var(--bills-font-size) * 0.82);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .sponsor-modal-images {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      margin-top: 14px;
    }

    .sponsor-modal-images img {
      width: 100%;
      max-height: 360px;
      object-fit: contain;
      background: transparent;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      display: block;
    }

    .sponsor-modal-images figcaption {
      margin-top: 6px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.85) !important;
    }

    @media (max-width: 700px) {
      .bills-shell {
        height: calc(100vh - 70px);
        padding: 10px 12px 12px;
      }

      .insights-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .bills-titlebar {
        gap: 8px;
      }
    }
  </style>

    <source src="/videos/baltimorenight_15s_crossfaded.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>


  <nav class="main-nav" aria-label="Main Navigation">
    <div class="navbar dark-mode">
      <a href="/#main">Home</a>
      <a href="/platform.html">Platform</a>
      <a href="/calendar.html?city=baltimore">Calendar</a>
      <a href="/projects.html">Projects</a>
      <a
        id="portal-login-button"
        class="nav-login-button"
        href="/p/"
        data-pidp-base="https://id.codecollective.us"
        aria-label="Log in to the portal"
      >Login</a>
    </div>
  </nav>

  <main id="wrapper" class="longform dark-mode" style="padding: 0; margin: 0;">
    <section id="main" class="longform dark-mode" style="padding: 0; margin: 0;">
      <div class="bills-shell">
        <section class="bills-titlebar">
          <h1>Maryland Bills</h1>
          <div class="bills-meta">
            <span id="bill-count">Loading bills...</span>
            <span id="bill-updated"></span>
          </div>
          <div class="toolbar-actions">
            <button id="reset-filters" type="button" class="toolbar-reset">Reset Filters</button>
          </div>
        </section>

        <section class="insights-grid">
          <section class="column-panel" aria-label="Primary sponsor bill counts" id="sponsor-column">
            <div class="list-panel-head">
              <span>Primary Sponsor</span>
              <div class="panel-header-right">
                <div class="font-size-controls">
                  <button type="button" class="font-size-btn" data-column="sponsor" data-action="down" aria-label="Decrease sponsor font size">−</button>
                  <button type="button" class="font-size-btn" data-column="sponsor" data-action="up" aria-label="Increase sponsor font size">+</button>
                </div>
                <span>Bills</span>
              </div>
            </div>
            <div class="search-wrap">
              <input id="sponsor-filter" class="column-search" type="search" placeholder="Search sponsors" autocomplete="off" />
              <button type="button" class="search-clear" data-clear-target="sponsor-filter" aria-label="Clear sponsor search">X</button>
            </div>
            <div id="sponsor-table-body" class="list-panel-body">
              <div class="list-row"><span>Loading sponsors...</span><span class="list-count">...</span></div>
            </div>
          </section>
          <section class="column-panel" aria-label="Category counts" id="category-column">
            <div class="list-panel-head">
              <span>Category</span>
              <div class="panel-header-right">
                <div class="font-size-controls">
                  <button type="button" class="font-size-btn" data-column="category" data-action="down" aria-label="Decrease category font size">−</button>
                  <button type="button" class="font-size-btn" data-column="category" data-action="up" aria-label="Increase category font size">+</button>
                </div>
                <span>Bills</span>
              </div>
            </div>
            <div class="search-wrap">
              <input id="category-filter" class="column-search" type="search" placeholder="Search categories" autocomplete="off" />
              <button type="button" class="search-clear" data-clear-target="category-filter" aria-label="Clear category search">X</button>
            </div>
            <div id="category-table-body" class="list-panel-body">
              <div class="list-row"><span>Loading categories...</span><span class="list-count">...</span></div>
            </div>
          </section>
          <section class="column-panel" aria-live="polite" id="bills-column">
            <div class="list-panel-head">
              <span>Bills</span>
              <div class="panel-header-right">
                <div class="font-size-controls">
                  <button type="button" class="font-size-btn" data-column="bills" data-action="down" aria-label="Decrease bills font size">−</button>
                  <button type="button" class="font-size-btn" data-column="bills" data-action="up" aria-label="Increase bills font size">+</button>
                </div>
                <label class="header-check" for="house-only-toggle">
                  <input id="house-only-toggle" type="checkbox" checked />
                  House
                </label>
                <label class="header-check" for="senate-only-toggle">
                  <input id="senate-only-toggle" type="checkbox" checked />
                  Senate
                </label>
                <label class="header-check" for="upcoming-only-toggle">
                  <input id="upcoming-only-toggle" type="checkbox" />
                  Upcoming only
                </label>
                <label class="header-check" for="passed-only-toggle">
                  <input id="passed-only-toggle" type="checkbox" checked />
                  Passed
                </label>
                <label class="header-check" for="not-passed-only-toggle">
                  <input id="not-passed-only-toggle" type="checkbox" checked />
                  Not Passed
                </label>
              </div>
            </div>
            <div class="search-wrap">
              <input id="bill-filter" class="column-search" type="search" placeholder="Search bills by title, sponsor, status, subject" autocomplete="off" />
              <button type="button" class="search-clear" data-clear-target="bill-filter" aria-label="Clear bill search">X</button>
            </div>
            <section class="bills-table-wrap">
              <table class="bills-table">
                <thead>
                  <tr>
                    <th class="sortable resizable" data-sort="billNumber" tabindex="0" role="button" aria-label="Sort by bill number">Bill <span class="sort-indicator"></span><span class="resize-handle"></span></th>
                    <th class="sortable resizable" data-sort="title" tabindex="0" role="button" aria-label="Sort by title">Title <span class="sort-indicator"></span><span class="resize-handle"></span></th>
                    <th class="sortable resizable" data-sort="sponsor" tabindex="0" role="button" aria-label="Sort by sponsor">Primary Sponsor <span class="sort-indicator"></span><span class="resize-handle"></span></th>
                    <th class="sortable resizable" data-sort="status" tabindex="0" role="button" aria-label="Sort by status">Status <span class="sort-indicator"></span><span class="resize-handle"></span></th>
                    <th class="sortable resizable" data-sort="passed" tabindex="0" role="button" aria-label="Sort by pass status">Passed <span class="sort-indicator"></span><span class="resize-handle"></span></th>
                    <th class="sortable resizable" data-sort="hearingDate" tabindex="0" role="button" aria-label="Sort by hearing date">Hearing Date <span class="sort-indicator"></span></th>
                  </tr>
                </thead>
                <tbody id="bills-table-body">
                  <tr><td colspan="6">Loading bills...</td></tr>
                </tbody>
              </table>
            </section>
          </section>
        </section>

        <p id="status-message" class="status-message" aria-live="polite">Loading bill data...</p>
      </div>
    </section>

  </main>

  <section id="bill-modal" class="bill-modal" role="dialog" aria-modal="true" aria-labelledby="bill-modal-title">
    <div class="bill-modal-dialog">
      <div class="bill-modal-head">
        <h2 id="bill-modal-title">Bill Details</h2>
        <button type="button" id="bill-modal-close" class="bill-modal-close">Close</button>
      </div>
      <div id="bill-modal-content"></div>
    </div>
  </section>
  <div id="hover-card" class="hover-card" role="tooltip" aria-hidden="true"></div>
