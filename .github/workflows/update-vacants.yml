name: Update Baltimore Vacants Data

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update_vacants_and_publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh Baltimore vacants cache
        run: |
          python baltimore/fetch_vacants.py \
            --output baltimore/data/vacants.geojson

      - name: Build sharded vacants payload
        run: |
          python baltimore/shard_vacants.py \
            --input baltimore/data/vacants.geojson \
            --output-root baltimore/data/publish \
            --prefix vacants \
            --shard-size 1000
          python baltimore/build_vacants_parcels.py \
            --vacants-input baltimore/data/vacants.geojson \
            --output baltimore/data/vacants_parcels.geojson
          python baltimore/shard_vacants.py \
            --input baltimore/data/vacants_parcels.geojson \
            --output-root baltimore/data/publish \
            --prefix vacants_parcels \
            --shard-size 500

      - name: Publish shards to Cloudflare R2 via Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm i -g wrangler@4
          count=0
          while IFS= read -r -d '' f; do
            key="${f#baltimore/data/publish/}"
            wrangler r2 object put "codecollective-usajobs/${key}" --file "$f" --remote
            count=$((count+1))
            if [ $((count % 20)) -eq 0 ]; then
              echo "Uploaded ${count} objects"
            fi
          done < <(find baltimore/data/publish/vacants -type f -print0 | sort -z)
          while IFS= read -r -d '' f; do
            key="${f#baltimore/data/publish/}"
            wrangler r2 object put "codecollective-usajobs/${key}" --file "$f" --remote
            count=$((count+1))
            if [ $((count % 20)) -eq 0 ]; then
              echo "Uploaded ${count} objects"
            fi
          done < <(find baltimore/data/publish/vacants_parcels -type f -print0 | sort -z)
          echo "Uploaded total ${count} objects"
