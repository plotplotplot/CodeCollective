name: Cloudflare Deploy

on:
  pull_request:
    paths:
      - ".github/workflows/cloudflare-deploy.yml"
      - "cloudflare/**"
      - "css/**"
      - "js/**"
      - "images/**"
      - "videos/**"
      - "audio/**"
      - "index.html"
      - "deploy.sh"
      - "scripts/build_cloudflare_site.sh"
      - "wrangler.toml"
      - "portal/web/**"
      - "portal/pidp/serverless/**"
      - "portal/org-worker/**"
      - "r8-rowhome/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cloudflare-deploy.yml"
      - "cloudflare/**"
      - "css/**"
      - "js/**"
      - "images/**"
      - "videos/**"
      - "audio/**"
      - "index.html"
      - "deploy.sh"
      - "scripts/build_cloudflare_site.sh"
      - "wrangler.toml"
      - "portal/web/**"
      - "portal/pidp/serverless/**"
      - "portal/org-worker/**"
      - "r8-rowhome/**"
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "What to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - site
          - pidp
          - org
          - checks-only

concurrency:
  group: cloudflare-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PROD_PIDP_API_ORIGIN: "https://id.codecollective.us"
  PROD_PIDP_PROXY_ORIGIN: "https://pidp-codecollective.jcloiacon.workers.dev"
  PROD_ORG_API_ORIGIN: "https://org-codecollective.jcloiacon.workers.dev"

jobs:
  site-check:
    name: Site Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install portal dependencies
        working-directory: portal/web
        run: npm ci

      - name: Install r8-rowhome dependencies
        working-directory: r8-rowhome
        run: npm ci

      - name: Build Cloudflare site bundle
        env:
          STRICT_TS: "1"
          VITE_PIDP_BASE_URL: ${{ env.PROD_PIDP_API_ORIGIN }}
        run: ./scripts/build_cloudflare_site.sh

      - name: Smoke test shared nav login
        run: |
          python3 -m http.server 8765 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          npx --prefix portal/web playwright install chromium --with-deps
          SMOKE_BASE_URL=http://127.0.0.1:8765 \
            PLAYWRIGHT_CHROME_PATH=/usr/bin/google-chrome \
            node scripts/smoke_nav_login.mjs

  pidp-check:
    name: PIdP Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install PIdP dependencies
        working-directory: portal/pidp/serverless
        run: npm ci

      - name: Typecheck PIdP
        working-directory: portal/pidp/serverless
        run: npm run typecheck

      - name: Test PIdP
        working-directory: portal/pidp/serverless
        run: npm test

  org-check:
    name: Org Worker Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install org Worker dependencies
        working-directory: portal/org-worker
        run: npm ci

      - name: Typecheck org Worker
        working-directory: portal/org-worker
        run: npm run typecheck

      - name: Test org Worker
        working-directory: portal/org-worker
        run: npm test

  site-deploy:
    name: Deploy Site Worker
    runs-on: ubuntu-latest
    needs: site-check
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
        (inputs.deploy_target == 'all' || inputs.deploy_target == 'site'))
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install portal dependencies
        working-directory: portal/web
        run: npm ci

      - name: Install r8-rowhome dependencies
        working-directory: r8-rowhome
        run: npm ci

      - name: Deploy production site Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROD_GOVERNANCE_API_ORIGIN: ${{ secrets.PROD_GOVERNANCE_API_ORIGIN }}
          PROD_ORG_API_ORIGIN: ${{ env.PROD_ORG_API_ORIGIN }}
          PROD_PIDP_API_ORIGIN: ${{ env.PROD_PIDP_API_ORIGIN }}
          PROD_PIDP_PROXY_ORIGIN: ${{ env.PROD_PIDP_PROXY_ORIGIN }}
          VITE_PIDP_BASE_URL: ${{ env.PROD_PIDP_API_ORIGIN }}
        run: ./deploy.sh --component site --target prod

  org-deploy:
    name: Deploy Org Worker
    runs-on: ubuntu-latest
    needs: org-check
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
        (inputs.deploy_target == 'all' || inputs.deploy_target == 'org'))
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install org Worker dependencies
        working-directory: portal/org-worker
        run: npm ci

      - name: Deploy org Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ORG_WORKER_NAME: ${{ vars.ORG_WORKER_NAME }}
          ORG_VERIFY_ORIGIN: ${{ vars.ORG_VERIFY_ORIGIN }}
          ORG_PIDP_BASE_URL: ${{ env.PROD_PIDP_API_ORIGIN }}
          ORG_PUBLIC_PORTAL_BASE_URL: "https://codecollective.us/p"
          ORG_ADMIN_EMAILS: ${{ vars.ORG_ADMIN_EMAILS }}
          ORG_ADMIN_USER_IDS: ${{ vars.ORG_ADMIN_USER_IDS }}
          ORG_D1_DATABASE_NAME: ${{ vars.ORG_D1_DATABASE_NAME }}
          ORG_D1_DATABASE_ID: ${{ vars.ORG_D1_DATABASE_ID }}
        run: ./deploy.sh --component org --skip-org-migrations

  pidp-deploy:
    name: Deploy PIdP Worker
    runs-on: ubuntu-latest
    needs: pidp-check
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
        (inputs.deploy_target == 'all' || inputs.deploy_target == 'pidp'))
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install PIdP dependencies
        working-directory: portal/pidp/serverless
        run: npm ci

      - name: Deploy PIdP Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PIDP_WORKER_NAME: ${{ vars.PIDP_WORKER_NAME }}
          PIDP_APP_NAME: ${{ vars.PIDP_APP_NAME }}
          PIDP_ENV: ${{ vars.PIDP_ENV }}
          PIDP_ACCESS_TOKEN_EXPIRE_MINUTES: ${{ vars.PIDP_ACCESS_TOKEN_EXPIRE_MINUTES }}
          PIDP_ALLOWED_ORIGINS: ${{ vars.PIDP_ALLOWED_ORIGINS }}
          PIDP_ADMIN_EMAILS: ${{ vars.PIDP_ADMIN_EMAILS }}
          PIDP_ADMIN_USER_IDS: ${{ vars.PIDP_ADMIN_USER_IDS }}
          PIDP_PUBLIC_R2_BASE_URL: ${{ vars.PIDP_PUBLIC_R2_BASE_URL }}
          PIDP_FRONTEND_REDIRECT_URL: ${{ vars.PIDP_FRONTEND_REDIRECT_URL }}
          PIDP_GOOGLE_REDIRECT_URI: ${{ vars.PIDP_GOOGLE_REDIRECT_URI }}
          PIDP_GITHUB_REDIRECT_URI: ${{ vars.PIDP_GITHUB_REDIRECT_URI }}
          PIDP_D1_DATABASE_NAME: ${{ vars.PIDP_D1_DATABASE_NAME }}
          PIDP_D1_DATABASE_ID: ${{ vars.PIDP_D1_DATABASE_ID }}
          PIDP_R2_BUCKET_NAME: ${{ vars.PIDP_R2_BUCKET_NAME }}
        run: ./deploy.sh --component pidp --skip-pidp-migrations
