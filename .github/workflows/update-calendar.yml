name: Update Calendar

on:
  push:
    branches:
      - main  # Runs on push to the main branch
  schedule:
    - cron: '0 0 * * *'  # Runs daily at 00:00 UTC
  workflow_dispatch:  # Allows manual trigger from the Actions tab

jobs:
  update_calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run genBaltimoreCalendar.py
        run: |
          python genBaltimoreCalendar.py

      - name: Check for changes
        run: |
          if git diff --exit-code meetup_upcoming.html; then
            echo "No changes in meetup_upcoming.html"
            exit 0
          else
            echo "Changes detected in meetup_upcoming.html"
          fi

      - name: Commit and push changes
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update meetup_upcoming.html"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
