name: Update Calendar

on:
  push:
    branches:
      - main  # Runs on push to the main branch
  schedule:
    - cron: '0 0 * * *'  # Runs daily at 00:00 UTC
  workflow_dispatch:  # Allows manual trigger from the Actions tab

jobs:
  update_calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Determine whether to refresh Baltimore profile images
        id: baltimore_images
        run: |
          if [ "$(date -u +%d)" = "01" ]; then
            echo "refresh_profile_images=true" >> "$GITHUB_OUTPUT"
          else
            echo "refresh_profile_images=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh Maryland bills cache
        run: |
          python fetch_mdbills_cache.py

      - name: Refresh Baltimore testimony cache
        run: |
          if [ "${{ steps.baltimore_images.outputs.refresh_profile_images }}" = "true" ]; then
            python baltimore/testimony/fetch_bills.py --refresh-profile-images
          else
            python baltimore/testimony/fetch_bills.py
          fi

      - name: Run genCalendar.py
        run: |
          python genCalendar.py

      - name: Check for changes
        run: |
          if git diff --exit-code; then
            echo "No repository changes detected"
            exit 0
          else
            echo "Changes detected"
          fi

      - name: Commit and push changes
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update calendar and cached legislative data" || echo "No changes to commit"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
