name: Update Calendar

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at 00:00 UTC
  workflow_dispatch:  # Allows manual trigger from the Actions tab

jobs:
  update_calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run genCalendar.py
        run: |
          python genCalendar.py

      - name: Push org/event feed to org-backend
        env:
          ORG_BACKEND_INGEST_URL: ${{ secrets.ORG_BACKEND_INGEST_URL }}
          ORG_BACKEND_INGEST_TOKEN: ${{ secrets.ORG_BACKEND_INGEST_TOKEN }}
        run: |
          if [ -z "${ORG_BACKEND_INGEST_URL}" ] || [ -z "${ORG_BACKEND_INGEST_TOKEN}" ]; then
            echo "Skipping org backend ingest: missing ORG_BACKEND_INGEST_URL or ORG_BACKEND_INGEST_TOKEN"
            exit 0
          fi
          python scripts/push_org_network_feed.py

      - name: Check for changes
        run: |
          if git diff --exit-code; then
            echo "No repository changes detected"
            exit 0
          else
            echo "Changes detected"
          fi

      - name: Commit and push changes
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            baltimore/cc_events.ics \
            baltimore/eventsplain.html \
            baltimore/scrape_errors.json \
            baltimore/unmatched_source_patterns.json \
            baltimore/upcoming_events.json \
            dc/cc_events.ics \
            dc/eventsplain.html \
            dc/scrape_errors.json \
            dc/unmatched_source_patterns.json \
            dc/upcoming_events.json \
            hawaii/cc_events.ics \
            hawaii/eventsplain.html \
            hawaii/scrape_errors.json \
            hawaii/unmatched_source_patterns.json \
            hawaii/upcoming_events.json \
            pittsburgh/cc_events.ics \
            pittsburgh/eventsplain.html \
            pittsburgh/scrape_errors.json \
            pittsburgh/unmatched_source_patterns.json \
            pittsburgh/upcoming_events.json \
            virtual/cc_events.ics \
            virtual/eventsplain.html \
            virtual/scrape_errors.json \
            virtual/unmatched_source_patterns.json \
            virtual/upcoming_events.json \
            westvirginia/cc_events.ics \
            westvirginia/eventsplain.html \
            westvirginia/scrape_errors.json \
            westvirginia/unmatched_source_patterns.json \
            westvirginia/upcoming_events.json \
            cc_events.ics \
            event_images \
            upcoming_events.json \
            usa/data/usajobs-lite.json.gz
          git commit -m "Update calendar" || echo "No changes to commit"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
