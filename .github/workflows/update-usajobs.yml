name: Update USAJOBS Data

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update_usajobs_and_publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Refresh USAJOBS cache
        env:
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_USER_AGENT: ${{ secrets.USAJOBS_USER_AGENT }}
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_MAX_AGE_DAYS: '1'
        run: |
          ./usa/refresh_usajobs_search.sh

      - name: Build sharded USAJOBS payload
        run: |
          python usa/shard_jobs.py \
            --input usa/data/usajobs-lite.json.gz \
            --output-root usa/data/publish \
            --prefix jobs \
            --shard-size 500

      - name: Publish shards to Cloudflare R2 via Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm i -g wrangler@4
          count=0
          while IFS= read -r -d '' f; do
            key="${f#usa/data/publish/}"
            wrangler r2 object put "codecollective-usajobs/${key}" --file "$f" --remote
            count=$((count+1))
            if [ $((count % 20)) -eq 0 ]; then
              echo "Uploaded ${count} objects"
            fi
          done < <(find usa/data/publish/jobs -type f -print0 | sort -z)
          echo "Uploaded total ${count} objects"
