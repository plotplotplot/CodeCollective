name = "codecollective-site"
main = "cloudflare/worker.js"
compatibility_date = "2026-04-24"

[assets]
directory = ".cloudflare/site"
binding = "ASSETS"
run_worker_first = true

[vars]
GOVERNANCE_API_ORIGIN = "https://portal.arkavo.org"
PIDP_API_ORIGIN = "https://id.codecollective.us"
PIDP_PROXY_ORIGIN = "https://pidp-codecollective.jcloiacon.workers.dev"

[[r2_buckets]]
binding = "JOBS_BUCKET"
bucket_name = "codecollective-usajobs"

[[r2_buckets]]
binding = "VACANTS_BUCKET"
bucket_name = "codecollective-usajobs"
