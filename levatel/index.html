<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin" />
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp" />
    <title>Demo - LevaTel</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="/css/master.css" />
  </head>
  <body id="body">
    <nav class="main-nav" aria-label="Main Navigation">
      <div class="navbar dark-mode">
        <a href="/#main">Home</a>
        <a href="/balticonomy/">Balticonomy</a>
        <a href="/#about-us">About Us</a>
        <div class="auth-dropdown" id="authDropdown">
          <button
            class="auth-toggle hidden"
            id="authToggle"
            aria-expanded="false"
            aria-controls="authMenu"
          >
            <img
              src="https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y"
              alt="Profile"
              class="profile-pic"
            />
          </button>
          <button id="loginButtonNav" class="login-button">Login</button>
          <!-- Portal-style dropdown that renders at root level -->
          <div id="authMenuPortal"></div>
        </div>
      </div>
    </nav>

    <div class="levatel-horiz-container">
      <div class="levatel-vert-container">
        <h1>🎤 Voice Chat</h1>

        <button class="mic-button" id="micButton" disabled>🎤</button>

        <div class="status" id="status">Please login to start recording</div>

        <div class="volume-meter">
          <div class="volume-bar" id="volumeBar"></div>
        </div>

        <div class="vad-indicator">
          <div class="vad-light" id="vadLight"></div>
          <span id="vadStatus">Login to enable Voice Activity Detection</span>
        </div>

        <div class="settings">
          <div class="setting-group">
            <label for="endpoint">API Endpoint:</label>
            <input
              type="text"
              id="endpoint"
              placeholder="https://your-api.com/voice"
              value="https://whisper.app.codecollective.us/asr"
            />
          </div>

          <div class="setting-group">
            <label for="language">Language (optional):</label>
            <select id="language">
              <option value="">Auto-detect</option>
              <option value="en">English</option>
              <option value="es">Spanish</option>
              <option value="fr">French</option>
              <option value="de">German</option>
              <option value="it">Italian</option>
              <option value="pt">Portuguese</option>
              <option value="ru">Russian</option>
              <option value="ja">Japanese</option>
              <option value="ko">Korean</option>
              <option value="zh">Chinese</option>
            </select>
          </div>

          <div class="setting-group">
            <label for="task">Task:</label>
            <select id="task">
              <option value="transcribe">Transcribe</option>
              <option value="translate">Translate to English</option>
            </select>
          </div>

          <div class="setting-group">
            <label for="energyThreshold">Energy Threshold:</label>
            <input
              type="number"
              id="energyThreshold"
              min="0"
              max="1"
              step="0.01"
              value="0.02"
            />
          </div>

          <div class="setting-group">
            <label for="silenceDuration">Silence Duration (ms):</label>
            <input
              type="number"
              id="silenceDuration"
              min="500"
              max="5000"
              value="2000"
            />
          </div>

          <div class="setting-group">
            <label for="minSpeechDuration">Min Speech Duration (ms):</label>
            <input
              type="number"
              id="minSpeechDuration"
              min="100"
              max="2000"
              value="500"
            />
          </div>
        </div>
      </div>

      <!-- Add this inside <body>, before </body> -->
      <div class="dashboard-container">
        <div class="right-panel">
          <div id="userInfoBox" class="info-box">
            <h3>User Info</h3>
            <table id="userInfoTable"></table>
          </div>

          <div id="servicesBox" class="info-box">
            <h3>Available Services</h3>
            <table id="servicesTable"></table>
          </div>

          <div id="orderBox" class="info-box">
            <h3>Current Order</h3>
            <table id="orderTable"></table>
          </div>
        </div>
      </div>
    </div>

    <div class="error" id="error"></div>

    <div class="transcription empty" id="transcription">
      <h3>Transcription:</h3>
      <div class="transcription-text" id="transcriptionText">
        Your speech will appear here...
      </div>
    </div>

    <script type="module">
      import { auth, logout } from "./firebase-config.js";

      // Portal-based dropdown implementation
      const authToggle = document.getElementById("authToggle");
      const authMenuPortal = document.getElementById("authMenuPortal");
      const dropdownContainer = document.getElementById("authDropdown");

      // Centralized logout handler with error handling
      async function handleLogout() {
        try {
          console.log("Logout button clicked"); // Debug log
          
          // Clear the dropdown first
          authMenuPortal.innerHTML = '';
          
          // Call the logout function
          await logout();
          
          console.log("Logout successful"); // Debug log
          
          // Update UI immediately (the auth state change will also trigger)
          document.getElementById("status").textContent = "Please login to start recording";
          
        } catch (error) {
          console.error("Logout error:", error);
          document.getElementById("error").textContent = "Logout failed: " + error.message;
        }
      }

      function createDropdownMenu() {
        const menu = document.createElement("div");
        menu.className = "auth-menu-portal";
        menu.innerHTML = `
          <button id="accountButton" class="auth-button hidden">Account</button>
          <button id="logoutButton" class="auth-button">Logout</button>
        `;

        // Add logout handler with proper event delegation
        const logoutBtn = menu.querySelector("#logoutButton");
        if (logoutBtn) {
          logoutBtn.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            handleLogout();
          });
        }

        return menu;
      }

      function positionDropdownMenu(menu, toggle) {
        const rect = toggle.getBoundingClientRect();
        menu.style.top = `${rect.bottom + window.scrollY + 8}px`;
        menu.style.right = `${window.innerWidth - rect.right}px`;
      }

      // Toggle dropdown
      authToggle.addEventListener('click', (e) => {
        e.stopPropagation();

        // Check if portal has any content
        if (authMenuPortal.children.length > 0) {
          // Clear all portal content
          authMenuPortal.innerHTML = '';
        } else {
          // Create and show menu
          const menu = createDropdownMenu();
          positionDropdownMenu(menu, authToggle);
          authMenuPortal.appendChild(menu);
          
          // Add visible class after a short delay for animation
          setTimeout(() => menu.classList.add('visible'), 10);
        }
      });

      // Close dropdown when clicking outside
      document.addEventListener("click", (e) => {
        if (!dropdownContainer.contains(e.target)) {
          const menu = document.querySelector(".auth-menu-portal");
          if (menu) {
            menu.classList.remove("visible");
            setTimeout(() => {
              if (menu.parentNode) {
                menu.remove();
              }
            }, 200);
          }
        }
      });

      // Alternative: Event delegation for dynamically created logout buttons
      document.addEventListener('click', (e) => {
        if (e.target && e.target.id === 'logoutButton') {
          e.preventDefault();
          e.stopPropagation();
          handleLogout();
        }
      });

      // Update UI based on auth state
      auth.onAuthStateChanged((user) => {
        const loginNavBtn = document.getElementById("loginButtonNav");
        const authToggle = document.getElementById("authToggle");
        const micButton = document.getElementById("micButton");
        const statusElement = document.getElementById("status");

        if (user) {
          // User is logged in
          loginNavBtn?.classList?.add("hidden");
          authToggle?.classList?.remove("hidden");
          if (micButton) micButton.disabled = false;

          // Update profile picture from Firebase
          const profilePic = document.querySelector("#authToggle .profile-pic");
          if (profilePic) {
            const photoURL = user?.photoURL || 
              "https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y";
            profilePic.src = photoURL;
            profilePic.alt = `${user?.displayName || "User"} profile picture`;
            profilePic.onerror = () => {
              profilePic.src = "https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y";
            };
          }
          
          if (statusElement) {
            statusElement.textContent = `Logged in as ${user.displayName || "User"}`;
          }
        } else {
          // User is logged out
          loginNavBtn?.classList?.remove("hidden");
          authToggle?.classList?.add("hidden");
          if (micButton) micButton.disabled = true;
          
          if (statusElement) {
            statusElement.textContent = "Please login to start recording";
          }
          
          // Clear any existing dropdown
          authMenuPortal.innerHTML = '';
          
          // Add login button event listener
          if (loginNavBtn) {
            loginNavBtn.addEventListener("click", () => {
              window.location.href = "login.html";
            });
          }
        }
      });
    </script>
    <script type="text/javascript" src="./audio.js"></script>
    <script type="module" src="./data.js"></script>
  </body>
</html>
