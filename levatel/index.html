<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin" />
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp" />
    <title>Demo - LevaTel</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="/css/master.css?v=20260608-accountmenu" />
    <style>
      #loginContainer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1000;
        display: none;
      }
      .logged-out #main-content {
        display: none;
      }
    </style>
  </head>
  <body id="body">
    <div id="loginContainer"></div>
    <div id="main-content">
    <nav class="main-nav" aria-label="Main Navigation">
      <div class="navbar dark-mode">
        <a href="/#main">Home</a>
        <a href="/platform.html">Platform</a>
        <a href="/calendar.html?city=baltimore">Calendar</a>
        <a href="/projects.html">Projects</a>
        <div class="auth-dropdown" id="authDropdown">
          <button
            class="auth-toggle hidden"
            id="authToggle"
            aria-expanded="false"
            aria-controls="authMenu"
          >
            <img
              src="https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y"
              alt="Profile"
              class="profile-pic"
            />
            <span class="login-text">Login</span>
          </button>
          <button id="loginButtonNav" class="login-button hidden">Login</button>
          <!-- Portal-style dropdown that renders at root level -->
          <div id="authMenuPortal"></div>
        </div>
      </div>
    </nav>

    <div class="levatel-horiz-container">
      <div class="levatel-vert-container">
        <div class="transcription empty" id="transcription">
          <div class="transcription-text" id="transcriptionText">
            Your speech will appear here...
          </div>
        </div>

      </div>

      <!-- Add this inside <body>, before </body> -->
      <div class="dashboard-container">
        <div class="right-panel">
          <h3>Current Order</h3>
          <table id="orderTable"></table>
        </div>
      </div>
    </div>
    </div> <!-- Close main-content -->

    <div class="error" id="error"></div>

    <script type="module" src="./ui.js"></script>
    <script type="module" src="./audio.js"></script>
    <script type="module" src="./agent.js"></script>
    <script type="module" src="/js/reusableComponents.js?v=20260608-accountmenu"></script>
    <!-- <script type="module" src="./data.js"></script> -->
    
    <!-- Webcam element - uncomment for demo -->
    <!-- <video id="webcam" autoplay playsinline muted></video> -->
    
    <script type="module">
      // Import Firebase auth
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
      import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
      import { firebaseConfig } from "./firebase-config.js";

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // Handle auth state changes
      onAuthStateChanged(auth, (user) => {
        const loginContainer = document.getElementById('loginContainer');
        const body = document.getElementById('body');
        
        if (user) {
          // User is logged in
          loginContainer.style.display = 'none';
          body.classList.remove('logged-out');
        } else {
          // User is logged out - load login content
          fetch('login.html')
            .then(response => response.text())
            .then(html => {
              loginContainer.innerHTML = html;
              loginContainer.style.display = 'block';
              body.classList.add('logged-out');
            });
        }
      });

      // Request webcam access - Uncomment for demos
      /*
      const webcam = document.getElementById('webcam');
      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
          .then(stream => {
            webcam.srcObject = stream;
          })
          .catch(err => {
            console.error('Could not access webcam:', err);
          });
      }
          */
    </script>
  </body>
</html>
