<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Voice Recording App</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-frame {
            width: 400px;
            height: 500px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Login Required</h2>
            <p>Please sign in to access the voice recording app</p>
            <button id="googleSignIn" class="auth-button">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google logo">
                Sign in with Google
            </button>
        </div>
    </div>

    <script type="module">
        // Import Firebase auth and shared config
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
        import { firebaseConfig } from "./firebase-config.js";

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Handle Google sign-in button click
        document.getElementById('googleSignIn').addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    // Get user info including photoURL
                    const user = result.user;
                    window.location.href = "index.html";
                })
                .catch((error) => {
                    console.error("Login error:", error);
                });
        });

        // Redirect if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                if (user.photoURL) {
                    localStorage.setItem('userPhoto', user.photoURL);
                }
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
