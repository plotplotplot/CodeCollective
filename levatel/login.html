<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Voice Recording App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Login Required</h2>
            <p>Please sign in to access the voice recording app</p>
            <button id="googleSignIn" class="auth-button">
                <img src="https://www.google.com/favicon.ico" alt="Google logo">
                Sign in with Google
            </button>
            <button id="githubSignIn" class="auth-button">
                <img src="https://github.githubassets.com/favicons/favicon.png" alt="GitHub logo">
                Sign in with GitHub
            </button>
        </div>
    </div>

    <script type="module" src="./firebase-config.js"></script>
    </script>
</body>
</html>
