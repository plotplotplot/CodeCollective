version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - node --version
      - npm --version
      - git submodule update --init --recursive
      - pwd
      - ls -la
      - find . -maxdepth 4 -name 'package*.json' -print
      - cd r8-rowhome
      - pwd
      - ls -la
      - npm ci

  build:
    commands:
      - VITE_PUBLIC_BASE=/r8-rowhome/ npx vite build
      - cd ..
      - mkdir -p pipeline-output/source
      - mkdir -p pipeline-output/r8-rowhome
      - rsync -a --exclude pipeline-output ./ pipeline-output/source/
      - rsync -a r8-rowhome/dist/ pipeline-output/r8-rowhome/

artifacts:
  base-directory: pipeline-output
  files:
    - '**/*'