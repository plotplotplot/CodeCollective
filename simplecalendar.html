<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Upcoming Events</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --fg: #111111;
        --muted: #555555;
        --link: #000000;
        --card: #f7f7f7;
        --maxw: 950px;
        --ring: #cfcfcf;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: "Playfair Display", Georgia, "Times New Roman", serif;
        line-height: 1.6;
      }
      .wrap {
        width: 100%;
        padding: 1rem;
      }
      @media (min-width: 900px) {
        .wrap {
          max-width: var(--maxw);
          margin: 0 auto;
          padding: 2.5rem 2rem;
        }
      }
      header.site {
        margin-bottom: 1.25rem;
        border-bottom: 2px solid #e4e4e4;
        padding-bottom: 0.5rem;
      }
      header.site h1 {
        margin: 0;
        font-weight: 600;
        letter-spacing: 0.2px;
        font-size: 1.75rem;
      }
      .status {
        margin-top: 0.75rem;
        font-size: 0.95rem;
        color: var(--muted);
      }
      .date-head {
        margin: 2rem 0 1rem;
        padding-top: 0.5rem;
        border-top: 1px solid #ececec;
        font-size: 1.25rem;
        font-weight: 600;
      }

      .event {
        background: var(--card);
        border-radius: 14px;
        padding: 0.75rem 1rem;
        margin: 0.75rem 0;
        border: 1px solid #ececec;
      }
      .event-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .event-meta {
        display: inline-flex;
        gap: 0.75rem;
        min-width: 0;
        flex: 1 1 auto;
      }
      .event-time {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--muted);
        white-space: nowrap;
        flex: 0 0 auto;
      }
      .event-title {
        min-width: 0;
        flex: 1 1 auto;
      }
      .event-title a {
        color: var(--link);
        text-decoration: none;
        font-weight: 600;
        font-size: 1.05rem;
        word-break: break-word;
      }
      .event-title a:hover,
      .event-title a:focus {
        text-decoration: underline;
      }
      .event-title .nolink {
        font-weight: 600;
        font-size: 1.05rem;
      }

      .toggle-btn {
        flex: 0 0 auto;
        border: 1px solid var(--ring);
        background: #fff;
        border-radius: 10px;
        padding: 0.25rem 0.55rem;
        line-height: 1;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.08s ease;
      }
      .toggle-btn:active {
        transform: scale(0.98);
      }

      .event-body {
        display: none;
        margin-top: 0.6rem;
        border-top: 1px dashed #ddd;
        padding-top: 0.6rem;
      }
      .event-body.open {
        display: block;
      }
      .event-desc p {
        margin: 0.5rem 0 0;
      }
      .location {
        margin-top: 0.5rem;
        font-size: 0.9rem;
        color: var(--muted);
      }
      .event-image {
        display: block;
        max-width: 100%;
        height: auto;
        margin-top: 0.6rem;
        border-radius: 10px;
        border: 1px solid #e5e5e5;

        /* White-to-black angled gradient */
        background: linear-gradient(135deg, white, black);
      }

      .invalid-link {
        text-decoration: none;
        border-bottom: 1px dotted #aaa;
        color: inherit;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="site">
        <h1>Upcoming Events</h1>
        <div id="status" class="status" aria-live="polite">Loading events…</div>
      </header>
      <main id="events"></main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>

    <script>
      /* ---------- Date helpers ---------- */
      function normalizeIso(iso) {
        let s = String(iso || "")
          .trim()
          .replace("Z", "+00:00");
        s = s.replace(/([+-]\d{2})(\d{2})$/, "$1:$2");
        const m = s.match(/^(.*\.\d+)([+-]\d{2}:\d{2})$/);
        if (m) {
          const [pre, frac] = m[1].split(".", 2);
          s = `${pre}.${(frac + "000000").slice(0, 6)}${m[2]}`;
        }
        return s;
      }
      function parseDt(iso) {
        const normalized = normalizeIso(iso);
        const d = new Date(normalized);
        if (isNaN(d.getTime())) throw new Error(`Unparseable date: ${iso}`);
        return { date: d, normalized };
      }
      function niceDateFromParts(isoLike) {
        return isoLike.split("T")[0];
      }

      const fmtDate = new Intl.DateTimeFormat("en-US", {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric",
      });
      const fmtTime = new Intl.DateTimeFormat("en-US", {
        hour: "numeric",
        minute: "2-digit",
        hour12: true,
      });

      /* ---------- URL safety helpers ---------- */
      function toStr(u) {
        if (typeof u === "string") return u;
        if (u && typeof u === "object") {
          return u.url || u.href || u.link || u.uri || "";
        }
        return "";
      }
      function isBadLiteral(s) {
        const t = s.trim().toLowerCase();
        return (
          !t || t === "undefined" || t === "null" || t === "[object object]"
        );
      }
      function safeUrl(u) {
        const raw = toStr(u);
        if (isBadLiteral(raw)) return null;
        const s = raw.trim();
        try {
          const parsed = new URL(s, window.location.origin);
          const href = parsed.href;
          // Allow http(s), mailto, tel, hash and relative paths
          if (
            /^(https?:|mailto:|tel:)/i.test(href) ||
            s.startsWith("#") ||
            s.startsWith("/")
          ) {
            return href;
          }
          return null;
        } catch {
          // Accept simple hashes or root-relative as-is
          if (s.startsWith("#") || s.startsWith("/")) return s;
          return null;
        }
      }
      function escapeAttr(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      /* ---------- Marked configuration with robust links ---------- */
      const renderer = new marked.Renderer();
      renderer.link = (href, title, text) => {
        const fixed = safeUrl(href);
        if (!fixed) {
          return `<span class="invalid-link" title="Link unavailable">${text}</span>`;
        }
        const t = title ? ` title="${escapeAttr(title)}"` : "";
        const href2 = escapeAttr(fixed);
        if (typeof text === "undefined") {
          text = href2;
          console.log("Item is undefined");
        }

        return `<a href="${href2}" target="_blank" rel="noopener"${t}>${text}</a>`;
      };
      marked.setOptions({
        renderer,
        gfm: true,
        breaks: true,
        headerIds: false,
        mangle: false,
      });

      /* Post-process anchors inside HTML (for raw HTML links in descriptions) */
      function normalizeLinksInHTML(html) {
        const tmp = document.createElement("div");
        tmp.innerHTML = html;
        tmp.querySelectorAll("a").forEach((a) => {
          const fixed = safeUrl(a.getAttribute("href"));
          if (fixed) {
            a.setAttribute("href", fixed);
            a.setAttribute("target", "_blank");
            a.setAttribute("rel", "noopener");
          } else {
            const span = document.createElement("span");
            span.className = "invalid-link";
            span.textContent = a.textContent || "link";
            a.replaceWith(span);
          }
        });
        return tmp.innerHTML;
      }

      /* ---------- Description rendering ---------- */
      function formatDescription(text) {
        const rawHtml = marked.parse(text || "");
        let cleanHtml = DOMPurify.sanitize(rawHtml, {
          ADD_ATTR: ["target", "rel"],
        });
        cleanHtml = normalizeLinksInHTML(cleanHtml);
        return cleanHtml;
      }

      /* ---------- Event HTML ---------- */
      function buildEventHTML(ev, dt, idx) {
        const timeStr = fmtTime.format(dt.date);
        const name = ev.name || "Untitled";

        const eventHref = safeUrl(ev.url);
        const titleHTML = eventHref
          ? `<a href="${escapeAttr(
              eventHref
            )}" target="_blank" rel="noopener">${DOMPurify.sanitize(name)}</a>`
          : `<span class="nolink">${DOMPurify.sanitize(name)}</span>`;

        const descHTML = formatDescription(ev.description || "");
        const bodyId = `desc-${idx}-${dt.date.getTime()}`;

        const imgHref = safeUrl(ev.imageUrl);
        const imageHTML = imgHref
          ? `<img class="event-image" alt="${escapeAttr(
              name
            )}" data-src="${escapeAttr(imgHref)}" loading="lazy">`
          : "";

        let locHTML = "";
        if (ev.location && typeof ev.location === "object") {
          const locStr = [ev.location.name, ev.location.address]
            .filter(Boolean)
            .join(", ");
          if (locStr)
            locHTML = `<div class="location">${DOMPurify.sanitize(
              locStr
            )}</div>`;
        }

        return `<article class="event" data-event-index="${idx}">
    <div class="event-header">
      <div class="event-meta">
        <div class="event-time">${timeStr}</div>
        <div class="event-title">${titleHTML}</div>
      </div>
      <button class="toggle-btn" data-toggle="${bodyId}" aria-expanded="false" aria-controls="${bodyId}" aria-label="Show details">+</button>
    </div>
    <div class="event-body" id="${bodyId}" hidden>
      <div class="event-desc">${descHTML}</div>
      ${imageHTML}
      ${locHTML}
    </div>
  </article>`;
      }

      /* ---------- URL parameter helpers ---------- */
      function getCityFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        const city = urlParams.get('city');
        return city || 'baltimore'; // Default to baltimore if no city specified
      }

      /* ---------- Main render ---------- */
      async function loadAndRender() {
        const statusEl = document.getElementById("status");
        const main = document.getElementById("events");
        try {
          const city = getCityFromUrl();
          const endpoint = `/${city}/upcoming_events.json`;
          const res = await fetch(endpoint, {
            cache: "no-store",
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          if (!Array.isArray(data)) throw new Error("Expected a JSON array");

          const events = [];
          for (const ev of data) {
            if (!ev?.startDate) continue;
            try {
              events.push({ ...ev, _dt: parseDt(ev.startDate) });
            } catch {}
          }
          events.sort((a, b) => a._dt.date - b._dt.date);

          const groups = new Map();
          const order = [];
          for (const ev of events) {
            const key = niceDateFromParts(ev._dt.normalized);
            if (!groups.has(key)) {
              order.push(key);
              groups.set(key, {
                humanLabel: fmtDate.format(ev._dt.date),
                items: [],
              });
            }
            groups.get(key).items.push(ev);
          }

          if (order.length === 0) {
            statusEl.textContent = "No upcoming events.";
            main.innerHTML = "";
            return;
          }

          const chunks = [];
          let idx = 0;
          for (const key of order) {
            const group = groups.get(key);
            chunks.push(`<h2 class="date-head">${group.humanLabel}</h2>`);
            for (const ev of group.items) {
              chunks.push(buildEventHTML(ev, ev._dt, idx++));
            }
          }
          main.innerHTML = chunks.join("\n");
          statusEl.textContent = `${events.length} event${
            events.length === 1 ? "" : "s"
          } loaded.`;

          // Toggle & lazy image
          main.addEventListener("click", (e) => {
            const btn = e.target.closest(".toggle-btn");
            if (!btn) return;
            const targetId = btn.getAttribute("data-toggle");
            const panel = document.getElementById(targetId);
            if (!panel) return;

            const isOpen = panel.classList.toggle("open");
            if (isOpen) {
              panel.removeAttribute("hidden");
              btn.setAttribute("aria-expanded", "true");
              btn.textContent = "–";
              btn.setAttribute("aria-label", "Hide details");
              const img = panel.querySelector("img.event-image[data-src]");
              if (img && !img.getAttribute("src")) {
                img.setAttribute("src", img.getAttribute("data-src"));
              }
            } else {
              panel.setAttribute("hidden", "");
              btn.setAttribute("aria-expanded", "false");
              btn.textContent = "+";
              btn.setAttribute("aria-label", "Show details");
            }
          });
        } catch (err) {
          document.getElementById("events").innerHTML = "";
          document.getElementById("status").textContent =
            "Failed to load events.";
        }
      }

      document.addEventListener("DOMContentLoaded", loadAndRender);
    </script>
  </body>
</html>
