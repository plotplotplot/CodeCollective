<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Upcoming Events</title>
    <link rel="preload" href="/css/master.css?v=20260608-accountmenu2" as="style" />
    <link rel="stylesheet" href="/css/master.css?v=20260608-accountmenu2" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #002a61;
        --fg: #ffffff;
        --muted: #d1dce9;
        --link: #ffffff;
        --card: #002a61;
        --maxw: 950px;
        --ring: #002a61;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: "Playfair Display", Georgia, "Times New Roman", serif;
        line-height: 1.6;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
      }
      a {
        color: var(--link);
        font-weight: 700;
      }
      a:visited {
        color: var(--link);
      }
      .view-switch {
        margin: 1rem 0;
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
      }
      .view-switch a {
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 999px;
        padding: 0.35rem 0.9rem;
        background: rgba(0, 0, 0, 0.2);
        font-size: 0.95rem;
        text-decoration: none;
      }
      .view-switch a:hover,
      .view-switch a:focus {
        text-decoration: underline;
        background: rgba(255, 255, 255, 0.15);
      }
      .wrap {
        width: 100%;
        padding: 1rem;
      }
      @media (min-width: 900px) {
        .wrap {
          max-width: var(--maxw);
          margin: 0 auto;
          padding: 2.5rem 2rem;
        }
      }
      header.site {
        margin-bottom: 1.25rem;
        padding-bottom: 0.5rem;
      }
      header.site h1 {
        margin: 0;
        font-weight: 600;
        letter-spacing: 0.2px;
        font-size: 1.75rem;
      }
      .status {
        margin-top: 0.75rem;
        font-size: 0.95rem;
        color: var(--muted);
      }
      .city-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.65rem;
        margin: 1rem 0 0.5rem;
      }
      .city-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 999px;
        padding: 0.35rem 0.85rem;
        font-weight: 600;
      }
      .city-btn {
        border: 1px solid rgba(255, 255, 255, 0.5);
        background: transparent;
        color: var(--fg);
        border-radius: 999px;
        padding: 0.35rem 0.9rem;
        font-size: 0.95rem;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.1s ease;
      }
      .city-btn:hover,
      .city-btn:focus {
        background: rgba(255, 255, 255, 0.12);
      }
      .city-btn:active {
        transform: translateY(1px);
      }
      .date-head {
        margin: 2rem 0 1rem;
        padding-top: 0.5rem;
        border-top: 1px solid #ececec;
        font-size: 1.25rem;
        font-weight: 600;
      }

      .event {
        background: var(--card);
        border-radius: 14px;
        padding: 0.75rem 1rem;
        margin: 0.75rem 0;
        border: 1px solid #ececec;
      }
      .event-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .event-meta {
        display: inline-flex;
        gap: 0.75rem;
        min-width: 0;
        flex: 1 1 auto;
      }
      .event-time {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--muted);
        white-space: nowrap;
        flex: 0 0 auto;
      }
      .event-title {
        min-width: 0;
        flex: 1 1 auto;
      }
      .event-title a {
        color: var(--link);
        text-decoration: none;
        font-weight: 700;
        font-size: 1.05rem;
        word-break: break-word;
      }
      .event-title a:hover,
      .event-title a:focus {
        text-decoration: underline;
      }
      .event-title .nolink {
        font-weight: 600;
        font-size: 1.05rem;
      }

      .toggle-btn {
        flex: 0 0 auto;
        border: 1px solid var(--ring);
        background: #fff;
        border-radius: 10px;
        padding: 0.25rem 0.55rem;
        line-height: 1;
        font-size: 1rem;
        cursor: pointer;
      }
      .toggle-btn:focus,
      .toggle-btn:active {
        background: #fff;
        color: var(--fg);
      }

      .event-body {
        display: none;
        margin-top: 0.6rem;
        border-top: 1px dashed #ddd;
        padding-top: 0.6rem;
      }
      .event-body.open {
        display: block;
      }
      .event-desc p {
        margin: 0.5rem 0 0;
      }
      .location {
        margin-top: 0.5rem;
        font-size: 0.9rem;
        color: var(--muted);
      }
      .event-image {
        display: block;
        max-width: 100%;
        height: auto;
        margin-top: 0.6rem;
        border-radius: 10px;
        border: 1px solid #e5e5e5;

        /* White-to-black angled gradient */
        background: linear-gradient(135deg, white, black);
      }

      .invalid-link {
        text-decoration: none;
        border-bottom: 1px dotted #aaa;
        color: inherit;
        cursor: default;
      }
      .city-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 999;
      }
      .city-modal.open {
        display: flex;
      }
      .city-modal__backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        backdrop-filter: blur(6px);
      }
      .city-modal__dialog {
        position: relative;
        z-index: 1;
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        padding: 1.25rem 1.5rem;
        width: min(460px, 92vw);
        box-shadow: 0 18px 30px rgba(0, 0, 0, 0.35);
      }
      .city-modal__title {
        margin: 0 0 0.4rem;
        font-size: 1.35rem;
      }
      .city-modal__hint {
        margin: 0 0 1rem;
        color: var(--muted);
        font-size: 0.95rem;
      }
      .city-modal__label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.35rem;
      }
      .city-modal__select {
        width: 100%;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(0, 0, 0, 0.25);
        color: var(--fg);
        padding: 0.5rem 0.65rem;
        font-size: 1rem;
      }
      .city-modal__actions {
        margin-top: 1.2rem;
        display: flex;
        justify-content: flex-end;
        gap: 0.6rem;
      }
      .city-modal__close {
        position: absolute;
        top: 0.35rem;
        right: 0.35rem;
        border: none;
        background: transparent;
        color: var(--fg);
        font-size: 1.25rem;
        cursor: pointer;
      }
      .btn-ghost,
      .btn-primary {
        border-radius: 10px;
        padding: 0.5rem 0.85rem;
        font-size: 0.95rem;
        cursor: pointer;
        border: 1px solid transparent;
      }
      .btn-ghost {
        background: transparent;
        border-color: rgba(255, 255, 255, 0.25);
        color: var(--fg);
      }
      .btn-ghost:hover,
      .btn-primary:hover {
        filter: brightness(1.1);
      }
      .btn-primary {
        background: #fff;
        color: #0c2147;
        font-weight: 700;
      }
    </style>
  </head>
  <body>

    <nav class="main-nav" aria-label="Main Navigation">
      <div class="navbar dark-mode">
        <a href="/#main">Home</a>
        <a href="/platform.html">Platform</a>
        <a href="/calendar.html?city=baltimore">Calendar</a>
        <a href="/projects.html">Projects</a>
      </div>
    </nav>
    <div class="wrap">
      <header class="site">
        <h1>Upcoming Events</h1>
        <div id="status" class="status" aria-live="polite">Loading events…</div>
      </header>
      <div class="city-bar">
        <span class="city-chip">Showing <span id="currentCityLabel">Baltimore</span></span>
        <button type="button" class="city-btn" id="openCityModal">Change city</button>
      </div>
      <div class="view-switch">
        <a id="cardsViewLink" href="/calendar_cards.html">Switch to cards view</a>
        <a id="calendarViewLink" href="/calendar.html?view=calendar">Switch to calendar view</a>
      </div>
      <main id="events"></main>
    </div>
    <div
      id="cityModal"
      class="city-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="cityModalTitle"
      hidden
    >
      <div class="city-modal__backdrop" data-close-modal></div>
      <div class="city-modal__dialog">
        <button type="button" class="city-modal__close" aria-label="Close city selection" data-close-modal>
          ×
        </button>
        <h2 id="cityModalTitle" class="city-modal__title">Choose your city</h2>
        <p class="city-modal__hint">Pick the city whose tech events you want to see.</p>
        <label for="citySelect" class="city-modal__label">City</label>
        <select id="citySelect" class="city-modal__select"></select>
        <div class="city-modal__actions">
          <button type="button" class="btn-ghost" data-close-modal>Cancel</button>
          <button type="button" class="btn-primary" id="applyCityBtn">Show events</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script type="module" src="/js/reusableComponents.js?v=20260608-accountmenu2"></script>

    <script>
      /* ---------- Date helpers ---------- */
      function normalizeIso(iso) {
        let s = String(iso || "")
          .trim()
          .replace("Z", "+00:00");
        s = s.replace(/([+-]\d{2})(\d{2})$/, "$1:$2");
        const m = s.match(/^(.*\.\d+)([+-]\d{2}:\d{2})$/);
        if (m) {
          const [pre, frac] = m[1].split(".", 2);
          s = `${pre}.${(frac + "000000").slice(0, 6)}${m[2]}`;
        }
        return s;
      }
      function parseDt(iso) {
        const normalized = normalizeIso(iso);
        const d = new Date(normalized);
        if (isNaN(d.getTime())) throw new Error(`Unparseable date: ${iso}`);
        return { date: d, normalized };
      }
      function niceDateFromParts(isoLike) {
        return isoLike.split("T")[0];
      }

      const fmtDate = new Intl.DateTimeFormat("en-US", {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric",
      });
      const fmtTime = new Intl.DateTimeFormat("en-US", {
        hour: "numeric",
        minute: "2-digit",
        hour12: true,
      });

      /* ---------- URL safety helpers ---------- */
      function toStr(u) {
        if (typeof u === "string") return u;
        if (u && typeof u === "object") {
          return u.url || u.href || u.link || u.uri || "";
        }
        return "";
      }
      function isBadLiteral(s) {
        const t = s.trim().toLowerCase();
        return (
          !t || t === "undefined" || t === "null" || t === "[object object]"
        );
      }
      function safeUrl(u) {
        const raw = toStr(u);
        if (isBadLiteral(raw)) return null;
        const s = raw.trim();
        try {
          const parsed = new URL(s, window.location.origin);
          const href = parsed.href;
          // Allow http(s), mailto, tel, hash and relative paths
          if (
            /^(https?:|mailto:|tel:)/i.test(href) ||
            s.startsWith("#") ||
            s.startsWith("/")
          ) {
            return href;
          }
          return null;
        } catch {
          // Accept simple hashes or root-relative as-is
          if (s.startsWith("#") || s.startsWith("/")) return s;
          return null;
        }
      }
      function escapeAttr(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      /* ---------- Marked configuration with robust links ---------- */
      const renderer = new marked.Renderer();
      renderer.link = (href, title, text) => {
        const fixed = safeUrl(href);
        if (!fixed) {
          return `<span class="invalid-link" title="Link unavailable">${text}</span>`;
        }
        const t = title ? ` title="${escapeAttr(title)}"` : "";
        const href2 = escapeAttr(fixed);
        if (typeof text === "undefined") {
          text = href2;
          console.log("Item is undefined");
        }

        return `<a href="${href2}" target="_blank" rel="noopener"${t}>${text}</a>`;
      };
      marked.setOptions({
        renderer,
        gfm: true,
        breaks: true,
        headerIds: false,
        mangle: false,
      });

      /* Post-process anchors inside HTML (for raw HTML links in descriptions) */
      function normalizeLinksInHTML(html) {
        const tmp = document.createElement("div");
        tmp.innerHTML = html;
        tmp.querySelectorAll("a").forEach((a) => {
          const fixed = safeUrl(a.getAttribute("href"));
          if (fixed) {
            a.setAttribute("href", fixed);
            a.setAttribute("target", "_blank");
            a.setAttribute("rel", "noopener");
          } else {
            const span = document.createElement("span");
            span.className = "invalid-link";
            span.textContent = a.textContent || "link";
            a.replaceWith(span);
          }
        });
        return tmp.innerHTML;
      }

      /* ---------- Description rendering ---------- */
      function formatDescription(text) {
        const rawHtml = marked.parse(text || "");
        let cleanHtml = DOMPurify.sanitize(rawHtml, {
          ADD_ATTR: ["target", "rel"],
        });
        cleanHtml = normalizeLinksInHTML(cleanHtml);
        return cleanHtml;
      }

      /* ---------- Event HTML ---------- */
      function buildEventHTML(ev, dt, idx) {
        const timeStr = fmtTime.format(dt.date);
        const name = ev.name || "Untitled";

        const eventHref = safeUrl(ev.url);
        const titleHTML = eventHref
          ? `<a href="${escapeAttr(
              eventHref
            )}" target="_blank" rel="noopener">${DOMPurify.sanitize(name)}</a>`
          : `<span class="nolink">${DOMPurify.sanitize(name)}</span>`;

        const descHTML = formatDescription(ev.description || "");
        const bodyId = `desc-${idx}-${dt.date.getTime()}`;

        const imgHref = safeUrl(ev.imageUrl);
        const imageHTML = imgHref
          ? `<img class="event-image" alt="${escapeAttr(
              name
            )}" data-src="${escapeAttr(imgHref)}" loading="lazy">`
          : "";

        let locHTML = "";
        if (ev.location && typeof ev.location === "object") {
          const locStr = [ev.location.name, ev.location.address]
            .filter(Boolean)
            .join(", ");
          if (locStr)
            locHTML = `<div class="location">${DOMPurify.sanitize(
              locStr
            )}</div>`;
        }

        return `<article class="event" data-event-index="${idx}">
    <div class="event-header">
      <div class="event-meta">
        <div class="event-time">${timeStr}</div>
        <div class="event-title">${titleHTML}</div>
      </div>
      <button class="toggle-btn" data-toggle="${bodyId}" aria-expanded="false" aria-controls="${bodyId}" aria-label="Show details">+</button>
    </div>
    <div class="event-body" id="${bodyId}" hidden>
      <div class="event-desc">${descHTML}</div>
      ${imageHTML}
      ${locHTML}
    </div>
  </article>`;
      }

      /* ---------- City helpers ---------- */
      const CITY_OPTIONS = window.CALENDAR_CITY_OPTIONS || [
        "baltimore",
        "westvirginia",
        "hawaii",
        "dc",
        "pittsburgh",
        "philadelphia",
        "virtual"
      ];
      const CITY_DISPLAY_NAMES = window.CALENDAR_CITY_DISPLAY_NAMES || {
        baltimore: "Baltimore",
        westvirginia: "West Virginia",
        hawaii: "Hawaii",
        dc: "Washington, D.C.",
        pittsburgh: "Pittsburgh",
        philadelphia: "Philadelphia",
        virtual: "Virtual",
      };
      function getCityDisplayName(city) {
        return (
          CITY_DISPLAY_NAMES[city] ||
          (city ? city.charAt(0).toUpperCase() + city.slice(1) : "Baltimore")
        );
      }

      /* ---------- URL parameter helpers ---------- */
      function getCityFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        const city = urlParams.get('city');
        if (city && CITY_OPTIONS.includes(city)) return city;
        return CITY_OPTIONS[0] || 'baltimore';
      }
      function setCityInUrl(city) {
        const url = new URL(window.location.href);
        url.searchParams.set("city", city);
        window.history.replaceState({}, "", url);
      }
      function syncCardsLink(city) {
        const link = document.getElementById("cardsViewLink");
        if (!link) return;
        const url = new URL(link.href || "/calendar_cards.html", window.location.href);
        url.searchParams.set("city", city);
        link.href = `${url.pathname}${url.search}`;
      }
      function syncCalendarLink(city) {
        const link = document.getElementById("calendarViewLink");
        if (!link) return;
        const url = new URL(link.href || "/calendar.html", window.location.href);
        url.searchParams.set("city", city);
        link.href = `${url.pathname}${url.search}`;
      }
      function updateCityLabel(city) {
        const label = document.getElementById("currentCityLabel");
        if (label) {
          label.textContent = getCityDisplayName(city);
        }
      }
      function populateCitySelect(city) {
        const select = document.getElementById("citySelect");
        if (!select) return;
        select.innerHTML = "";
        CITY_OPTIONS.forEach((opt) => {
          const option = document.createElement("option");
          option.value = opt;
          option.textContent = getCityDisplayName(opt);
          select.appendChild(option);
        });
        select.value = city;
      }

      /* ---------- Modal controls ---------- */
      function openCityModal() {
        const modal = document.getElementById("cityModal");
        if (!modal) return;
        modal.classList.add("open");
        modal.removeAttribute("hidden");
        const select = document.getElementById("citySelect");
        if (select) select.focus();
      }
      function closeCityModal() {
        const modal = document.getElementById("cityModal");
        if (!modal) return;
        modal.classList.remove("open");
        modal.setAttribute("hidden", "");
      }
      function bindCityModalControls() {
        const openBtn = document.getElementById("openCityModal");
        const applyBtn = document.getElementById("applyCityBtn");
        const modal = document.getElementById("cityModal");
        const select = document.getElementById("citySelect");
        if (openBtn) openBtn.addEventListener("click", openCityModal);
        if (applyBtn) {
          applyBtn.addEventListener("click", () => {
            if (!select) return;
            const chosen = select.value;
            if (!CITY_OPTIONS.includes(chosen)) return;
            setCityInUrl(chosen);
            updateCityLabel(chosen);
            syncCardsLink(chosen);
            syncCalendarLink(chosen);
            loadAndRender();
            closeCityModal();
          });
        }
        if (modal) {
          modal.addEventListener("click", (e) => {
            if (e.target.dataset.closeModal !== undefined || e.target === modal) {
              closeCityModal();
            }
          });
        }
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") closeCityModal();
        });
      }

      /* ---------- Event toggle wiring ---------- */
      let toggleBound = false;
      function bindToggleHandlers() {
        if (toggleBound) return;
        const main = document.getElementById("events");
        if (!main) return;
        main.addEventListener("click", (e) => {
          const btn = e.target.closest(".toggle-btn");
          if (!btn) return;
          const targetId = btn.getAttribute("data-toggle");
          const panel = document.getElementById(targetId);
          if (!panel) return;

          const isOpen = panel.classList.toggle("open");
          if (isOpen) {
            panel.removeAttribute("hidden");
            btn.setAttribute("aria-expanded", "true");
            btn.textContent = "–";
            btn.setAttribute("aria-label", "Hide details");
            const img = panel.querySelector("img.event-image[data-src]");
            if (img && !img.getAttribute("src")) {
              img.setAttribute("src", img.getAttribute("data-src"));
            }
          } else {
            panel.setAttribute("hidden", "");
            btn.setAttribute("aria-expanded", "false");
            btn.textContent = "+";
            btn.setAttribute("aria-label", "Show details");
          }
        });
        toggleBound = true;
      }

      /* ---------- Main render ---------- */
      async function loadAndRender() {
        const statusEl = document.getElementById("status");
        const main = document.getElementById("events");
        try {
          const city = getCityFromUrl();
          updateCityLabel(city);
          populateCitySelect(city);
          syncCardsLink(city);
          syncCalendarLink(city);
          const endpoint = `/${city}/upcoming_events.json`;
          const res = await fetch(endpoint, {
            cache: "no-store",
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          if (!Array.isArray(data)) throw new Error("Expected a JSON array");

          const events = [];
          for (const ev of data) {
            if (!ev?.startDate) continue;
            try {
              events.push({ ...ev, _dt: parseDt(ev.startDate) });
            } catch {}
          }
          events.sort((a, b) => a._dt.date - b._dt.date);

          const groups = new Map();
          const order = [];
          for (const ev of events) {
            const key = niceDateFromParts(ev._dt.normalized);
            if (!groups.has(key)) {
              order.push(key);
              groups.set(key, {
                humanLabel: fmtDate.format(ev._dt.date),
                items: [],
              });
            }
            groups.get(key).items.push(ev);
          }

          if (order.length === 0) {
            statusEl.textContent = "No upcoming events.";
            main.innerHTML = "";
            return;
          }

          const chunks = [];
          let idx = 0;
          for (const key of order) {
            const group = groups.get(key);
            chunks.push(`<h2 class="date-head">${group.humanLabel}</h2>`);
            for (const ev of group.items) {
              chunks.push(buildEventHTML(ev, ev._dt, idx++));
            }
          }
          main.innerHTML = chunks.join("\n");
          statusEl.textContent = `${events.length} event${
            events.length === 1 ? "" : "s"
          } loaded for ${getCityDisplayName(city)}.`;

        } catch (err) {
          document.getElementById("events").innerHTML = "";
          document.getElementById("status").textContent =
            "Failed to load events.";
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        bindToggleHandlers();
        bindCityModalControls();
        loadAndRender();
      });
    </script>
  </body>
</html>
